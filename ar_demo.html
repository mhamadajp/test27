<script>
AFRAME.registerComponent('marker-events', {
  init: function () {
    const status = document.getElementById('status');
    const hint = document.getElementById('hint');
    this.el.addEventListener('markerFound', () => {
      status.textContent = 'マーカー認識中：物体は机上に固定されています';
      status.style.color = '#0f766e';
      hint.textContent = '端末を左右・上下へ動かし、正面・側面・上面を観察してください。';
    });
    this.el.addEventListener('markerLost', () => {
      status.textContent = 'マーカーを探しています';
      status.style.color = '#b45309';
      hint.textContent = '黒い枠全体が画面に入るよう、カメラをマーカーへ向けてください。';
    });
  }
});
</script>

      </select>
    </label>
  </div>
</div>
