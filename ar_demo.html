<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>A4画像追跡AR・安定版</title>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.6.0/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}
.ui{position:fixed;z-index:20;top:8px;left:8px;right:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start}
.panel{background:rgba(255,255,255,.94);border-radius:13px;padding:9px 11px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
#status{font-size:14px;font-weight:800;color:#b45309}
#sub{font-size:11px;color:#475569;margin-top:3px;max-width:420px}
select,button{font:inherit;border:1px solid #cbd5e1;border-radius:9px;background:white;padding:7px 9px}
button{font-weight:700}
.guide{position:fixed;z-index:19;left:50%;bottom:12px;transform:translateX(-50%);background:rgba(0,0,0,.7);color:white;padding:8px 12px;border-radius:999px;font-size:12px;white-space:nowrap}
.badge{position:fixed;z-index:19;right:8px;bottom:8px;background:rgba(255,255,255,.92);border-radius:10px;padding:7px 9px;font-size:10px;max-width:180px}
@media(max-width:600px){.panel{padding:8px}.guide{font-size:10px;bottom:6px}.badge{display:none}}
</style>
<script>
AFRAME.registerComponent('target-events', {
  init: function () {
    const status = document.getElementById('status');
    const sub = document.getElementById('sub');
    let lostTimer = null;

    this.el.addEventListener('targetFound', () => {
      if (lostTimer) clearTimeout(lostTimer);
      status.textContent = '追跡中：物体は画像上に固定されています';
      status.style.color = '#0f766e';
      sub.textContent = '画像を机に置いたまま、端末を左右・上下へゆっくり回り込ませてください。';
    });

    this.el.addEventListener('targetLost', () => {
      status.textContent = '一時的に見失いました（表示を保持中）';
      status.style.color = '#b45309';
      sub.textContent = '画像の一部を画面へ戻してください。完全に外すと正確な空間固定はできません。';
      lostTimer = setTimeout(() => {
        status.textContent = '追跡画像を探しています';
      }, 1300);
    });
  }
});
</script>
</head>
<body>

<div class="ui">
  <div class="panel">
    <div id="status">追跡画像を探しています</div>
    <div id="sub">A4に印刷した「SOFTMIND」画像全体へ、最初は正面からカメラを向けてください。</div>
  </div>
  <div class="panel">
    <select id="objectSelect" aria-label="表示物体">
      <option value="house">非対称な家</option>
      <option value="cube">面ラベル付き立方体</option>
      <option value="trig">三角比モデル</option>
    </select>
    <button id="helpBtn" type="button">使い方</button>
  </div>
</div>

<div class="guide">画像の端を少し残しながら、端末を弧を描くように動かします</div>
<div class="badge">画像追跡方式：一部が見えている間は位置・向きを追跡します。</div>

<a-scene
  mindar-image="
    imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@master/examples/image-tracking/assets/card-example/card.mind;
    autoStart: true;
    uiScanning: yes;
    uiLoading: yes;
    uiError: yes;
    filterMinCF: 0.001;
    filterBeta: 0.01;
    warmupTolerance: 3;
    missTolerance: 30;
  "
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0" target-events>
    <!-- 半透明の基準面 -->
    <a-plane position="0 0 0.005" width="1" height="0.552"
      material="color:#38bdf8;opacity:.08;transparent:true"></a-plane>

    <!-- 画像中央より上へ物体を置き、回り込みの変化を大きくする -->
    <a-entity id="house" visible="true" position="0 0.08 0.12" rotation="90 0 0" scale=".35 .35 .35">
      <a-box position="0 .45 0" width="1.2" height=".9" depth=".95" color="#f2d0a2"></a-box>
      <a-cone position="0 1.08 0" radius-bottom=".88" radius-top="0" height=".7"
        segments-radial="4" rotation="0 45 0" color="#a83f3f"></a-cone>
      <a-box position="0 .32 .486" width=".26" height=".5" depth=".025" color="#654027"></a-box>
      <a-box position="-.38 .55 .486" width=".24" height=".24" depth=".025" color="#60a5fa"></a-box>
      <a-box position=".38 .55 .486" width=".24" height=".24" depth=".025" color="#60a5fa"></a-box>
      <a-box position=".611 .55 .08" width=".025" height=".28" depth=".35" color="#2563eb"></a-box>
      <a-box position="0 .56 -.486" width=".55" height=".2" depth=".025" color="#15803d"></a-box>
      <a-box position="-.34 1.32 -.15" width=".17" height=".48" depth=".17" color="#444"></a-box>
      <a-cylinder position=".65 .22 .55" radius=".10" height=".44" color="#ef4444"></a-cylinder>
      <a-cone position="-.65 .15 .52" radius-bottom=".15" radius-top="0" height=".5" color="#2563eb"></a-cone>
    </a-entity>

    <a-entity id="cube" visible="false" position="0 .08 .15" rotation="90 0 0" scale=".34 .34 .34">
      <a-box width="1" height="1" depth="1" color="#dbeafe"></a-box>
      <a-text value="FRONT" align="center" color="#0f3c67" width="2.4" position="0 0 .506"></a-text>
      <a-text value="RIGHT" align="center" color="#991b1b" width="2.4" position=".506 0 0" rotation="0 90 0"></a-text>
      <a-text value="BACK" align="center" color="#166534" width="2.4" position="0 0 -.506" rotation="0 180 0"></a-text>
      <a-text value="LEFT" align="center" color="#6b21a8" width="2.4" position="-.506 0 0" rotation="0 -90 0"></a-text>
      <a-text value="TOP" align="center" color="#92400e" width="2.4" position="0 .506 0" rotation="-90 0 0"></a-text>
      <a-sphere position=".32 .32 .52" radius=".07" color="#e11d48"></a-sphere>
      <a-cone position="-.32 -.30 .54" radius-bottom=".10" radius-top="0" height=".25" color="#0f766e"></a-cone>
    </a-entity>

    <a-entity id="trig" visible="false" position="0 .03 .10" rotation="90 0 0" scale=".38 .38 .38">
      <a-box position="-.55 .45 0" width=".07" height=".9" depth=".07" color="#1e293b"></a-box>
      <a-box position="0 .035 0" width="1.15" height=".07" depth=".07" color="#1e293b"></a-box>
      <a-cylinder position="0 .43 0" radius=".04" height="1.38" rotation="0 0 -51" color="#2563eb"></a-cylinder>
      <a-sphere position="-.55 .92 0" radius=".09" color="#e11d48"></a-sphere>
      <a-sphere position=".55 .07 0" radius=".09" color="#0f766e"></a-sphere>
      <a-text value="HEIGHT" align="center" color="#111827" width="1.8" position="-.72 .46 .03" rotation="0 0 90"></a-text>
      <a-text value="DISTANCE" align="center" color="#111827" width="1.8" position="0 .17 .03"></a-text>
    </a-entity>
  </a-entity>
</a-scene>

<script>
(() => {
  const items = {
    house: document.getElementById('house'),
    cube: document.getElementById('cube'),
    trig: document.getElementById('trig')
  };
  document.getElementById('objectSelect').addEventListener('change', e => {
    Object.entries(items).forEach(([key, el]) => el.setAttribute('visible', key === e.target.value));
  });
  document.getElementById('helpBtn').addEventListener('click', () => {
    alert(
      '1. 同梱のA4追跡画像を印刷します。\\n' +
      '2. 画像を机に置き、最初は30〜50cmから正面に映します。\\n' +
      '3. 認識後は画像の一部を画面に残し、端末を左右へ弧を描くように移動します。\\n' +
      '4. 端末をその場で回転するだけでなく、端末自体を横へ移動すると側面が大きく見えます。'
    );
  });
})();
</script>
</body>
</html>
