<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>統計検定3級学習ドリル（実践編）</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 min-h-screen">
    <div class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-lg">
        <a href="../index2.html" class="inline-block mb-4 px-4 py-2 rounded-full bg-blue-50 text-blue-700 border border-blue-200 font-bold text-sm hover:bg-blue-100 transition-colors no-underline">← index2.htmlに戻る</a>
        <h1 class="text-2xl md:text-3xl font-extrabold mb-2 text-center text-gray-800 tracking-tight">統計検定3級学習ドリル</h1>
        <p class="text-center text-sm md:text-base text-gray-500 mb-8 font-medium">出題範囲完全網羅（全90問）</p>
        
        <div id="menu" class="space-y-4">
            <h2 class="text-xl font-bold border-b-2 border-gray-200 pb-2 text-gray-700">学習モードを選択</h2>
            
            <button onclick="loadMode('data')" class="w-full bg-blue-500 text-white p-5 rounded-xl shadow-md hover:bg-blue-600 hover:shadow-lg transition-all text-left">
                <div class="font-bold text-lg mb-1">1. データの種類と集計、時系列 (全30問)</div>
                <div class="text-xs md:text-sm font-normal opacity-90">尺度の種類、標本と実験、多様なグラフ（バブル、ローソク足、モザイク図等）、クロス集計、移動平均など</div>
            </button>
            
            <button onclick="loadMode('graph')" class="w-full bg-green-500 text-white p-5 rounded-xl shadow-md hover:bg-green-600 hover:shadow-lg transition-all text-left">
                <div class="font-bold text-lg mb-1">2. 代表値、散らばり、相関と回帰 (全30問)</div>
                <div class="text-xs md:text-sm font-normal opacity-90">平均・分散の計算、箱ひげ図、幹葉図、共分散、相関係数と擬相関、回帰直線（最小二乗法）など</div>
            </button>
            
            <button onclick="loadMode('prob')" class="w-full bg-yellow-600 text-white p-5 rounded-xl shadow-md hover:bg-yellow-700 hover:shadow-lg transition-all text-left">
                <div class="font-bold text-lg mb-1">3. 確率分布と統計的な推測 (全30問)</div>
                <div class="text-xs md:text-sm font-normal opacity-90">条件付き確率、期待値、二項分布、正規分布、標本分布、区間推定、仮説検定の基礎など</div>
            </button>
            
            <button onclick="loadMode('mock')" class="w-full bg-purple-600 text-white p-5 rounded-xl shadow-md hover:bg-purple-700 hover:shadow-lg transition-all text-center mt-6 border-b-4 border-purple-800">
                <div class="font-black text-xl">模擬試験モード</div>
                <div class="text-sm opacity-90 mt-1">全分野からランダムに30問出題</div>
            </button>
        </div>

        <div id="quiz-container" class="hidden">
            <div class="flex justify-between items-center mb-4 bg-gray-50 p-3 rounded-lg border border-gray-200">
                <div id="progress" class="text-sm md:text-base text-gray-700 font-bold"></div>
                <button onclick="location.reload()" class="text-sm text-red-500 hover:text-red-700 font-bold flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    終了する
                </button>
            </div>
            
            <div id="question" class="text-lg md:text-xl font-bold mb-6 text-gray-800 leading-relaxed border-l-4 border-blue-500 pl-4 py-1"></div>
            
            <div id="options" class="space-y-3"></div>
            
            <div id="feedback" class="mt-6 p-5 rounded-lg hidden transition-all"></div>
            
            <button id="next-btn" onclick="nextQuestion()" class="hidden mt-6 w-full bg-gray-800 text-white p-4 rounded-xl font-bold text-lg hover:bg-gray-700 transition-colors shadow-lg active:scale-95">次の問題へ進む</button>
        </div>
        
        <div id="result-container" class="hidden text-center py-10">
            <h2 class="text-3xl font-black mb-6 text-gray-800">試験結果</h2>
            <div id="score" class="mb-10"></div>
            <button onclick="location.reload()" class="bg-gray-800 text-white p-4 rounded-xl w-full max-w-md mx-auto font-bold text-lg hover:bg-gray-700 transition shadow-lg block">トップメニューへ戻る</button>
        </div>
    </div>

    <script>
        const quizData = {
            data: [
                {q: "ある学校の全生徒500人からランダムに50人を選んでアンケートを行った。このときの「500人の集団」と「50人の集団」をそれぞれ何と呼ぶか。", options: ["標本、母集団", "母集団、標本", "母集団、全数", "全数、標本"], correct: 1, explanation: "調査の対象となる全体の集団を「母集団」、そこから実際に調査のために抽出された一部の集団を「標本（サンプル）」と呼びます。"},
                {q: "量的変数と質的変数の組み合わせとして正しいものはどれか。", options: ["【量的】血液型 【質的】体重", "【量的】満足度 【質的】気温", "【量的】降水量 【質的】性別", "【量的】郵便番号 【質的】身長"], correct: 2, explanation: "数値として大きさに意味があり計算できるものが「量的変数（降水量など）」、カテゴリや種類を表すためのものが「質的変数（性別など）」です。"},
                {q: "電話番号、背番号、血液型のように、単に対象を分類・区別するためだけに割り当てられた数値を何尺度と呼ぶか。", options: ["名義尺度", "順序尺度", "間隔尺度", "比例尺度"], correct: 0, explanation: "名義尺度は「名前（名義）」の代わりの数字です。大小関係や計算には意味がありません。"},
                {q: "アンケートの「1:とても不満、2:やや不満、3:普通、4:やや満足、5:とても満足」のように、大小の順序には意味があるが、間隔が等しいとは限らないデータを何尺度と呼ぶか。", options: ["名義尺度", "順序尺度", "間隔尺度", "比例尺度"], correct: 1, explanation: "順序尺度は、順位や段階を表すデータです。4と5の差が、1と2の差と等しいとは言えないのが特徴です。"},
                {q: "摂氏温度（℃）や西暦のように、目盛りの間隔は等しいが、「0」が絶対的な無（何もない状態）を意味しないデータを何尺度と呼ぶか。", options: ["名義尺度", "順序尺度", "間隔尺度", "比例尺度"], correct: 2, explanation: "間隔尺度は足し引きには意味がありますが、「20℃は10℃の2倍の暑さ」とは言えません（比率に意味がない）。"},
                {q: "身長、体重、金額などのように、「0」が絶対的な無を意味し、「AはBの2倍である」といった比率の計算に意味があるデータを何尺度と呼ぶか。", options: ["名義尺度", "順序尺度", "間隔尺度", "比例尺度"], correct: 3, explanation: "比例尺度（比率尺度）は最も情報量が多く、四則演算すべてに意味があるデータです。"},
                {q: "日本に住むすべての人を対象に行われる「国勢調査」は、次のうちどの調査方法にあたるか。", options: ["無作為抽出調査", "有意抽出調査", "全数調査（センサス）", "実験研究"], correct: 2, explanation: "母集団のすべてを調べる調査を「全数調査（センサス）」と呼びます。国勢調査はその代表例です。"},
                {q: "母集団から標本を選ぶ際、乱数表などを用いて、すべての要素が等しい確率で選ばれるようにする抽出法を何というか。", options: ["有意抽出法", "無作為抽出法", "層化抽出法", "機縁法"], correct: 1, explanation: "調査者の主観を入れず、くじ引きのようにランダムに選ぶことを無作為（ランダム）抽出法と呼び、偏りを防ぐ基本となります。"},
                {q: "男女の割合が「男60%：女40%」である母集団から標本を抽出する際、標本内の男女比も同じ「6：4」になるようにグループ（層）ごとに無作為抽出する方法を何というか。", options: ["単純無作為抽出法", "層化抽出法", "集落抽出法", "系統抽出法"], correct: 1, explanation: "母集団をあらかじめいくつかのグループ（層）に分け、各層から比率に応じて抽出する方法を層化抽出法（層化無作為抽出法）と呼びます。"},
                {q: "ある新薬の効果を確かめるため、被験者をランダムに2つのグループに分け、一方には新薬を、もう一方には偽薬（プラセボ）を投与した。このような研究手法を何というか。", options: ["観察研究", "実験研究", "事例研究", "全数調査"], correct: 1, explanation: "研究者が意図的に介入（薬の投与など処理を施すこと）を行い、その結果を比較する方法を「実験研究」と呼びます。"},
                {q: "上記の実験研究において、比較の基準とするために「偽薬（プラセボ）を投与された（または何も処理されなかった）」グループを何と呼ぶか。", options: ["処理群", "実験群", "対照群", "標本群"], correct: 2, explanation: "処理（新薬など）を与えるグループを「処理群」、比較の基準とするために処理を与えない（または偽薬を与える）グループを「対照群（コントロール群）」と呼びます。"},
                {q: "棒グラフとヒストグラムの見た目の違いとして、一般的に正しいものはどれか。", options: ["棒グラフは線で結ぶが、ヒストグラムは線で結ばない", "棒グラフは棒の間に隙間を空けるが、ヒストグラムは隙間を空けない", "棒グラフは円で表し、ヒストグラムは四角で表す", "違いは全くない"], correct: 1, explanation: "棒グラフはカテゴリ別（質的データ）なので棒の間に隙間を空けます。ヒストグラムは連続する区間（量的データ）を表すため、棒と棒をくっつけて描きます。"},
                {q: "複数の項目の「割合（構成比）」と、その「合計量の大きさ（実数）」を同時に比較するのに適したグラフはどれか。", options: ["折れ線グラフ", "積み上げ棒グラフ", "円グラフ", "レーダーチャート"], correct: 1, explanation: "積み上げ棒グラフは、棒全体の長さで「全体の量」を示し、棒の中の色分けで「内訳の割合」を示すことができるため、複数グループの比較に適しています。"},
                {q: "複数の変数（項目）について、中心からの距離でバランスや特徴をひと目で把握するのに適した多角形のグラフはどれか。", options: ["散布図", "レーダーチャート", "バブルチャート", "ローソク足"], correct: 1, explanation: "RPGのキャラクターの能力値（体力、攻撃力、素早さなど）や、企業の評価項目などを放射状の軸にプロットして結んだものをレーダーチャートと呼びます。"},
                {q: "散布図（縦軸と横軸）に、さらに「円の大きさ」という3つ目の変数を加えて、3つのデータの関係を同時に表現したグラフを何というか。", options: ["モザイク図", "複合グラフ", "レーダーチャート", "バブルチャート"], correct: 3, explanation: "バブルチャートは、x軸、y軸に加えて「円の面積（バブルの大きさ）」で3つ目のデータ量（例えば人口や売上規模など）を表現します。"},
                {q: "株価などの推移を表す際、「始値」「高値」「安値」「終値」の4つの情報を1つの図形で表した時系列グラフを何というか。", options: ["箱ひげ図", "ローソク足", "モザイク図", "幹葉図"], correct: 1, explanation: "ローソク足（キャンドルチャート）は金融分野でよく使われ、1日（または一定期間）の価格の変動幅と始点・終点を四角と線で表現します。"},
                {q: "2つの質的変数のクロス集計表（分割表）を視覚化したもので、四角形の面積で各セルの度数（人数など）の割合を表した図を何というか。", options: ["バブルチャート", "積み上げ棒グラフ", "モザイク図", "散布図"], correct: 2, explanation: "モザイク図は、全体を大きな長方形とし、縦横の変数（例えば性別と賛否）の比率で面積を分割していくグラフです。独立性（関連の有無）を見るのに便利です。"},
                {q: "ヒストグラムの元になる「度数分布表」において、各階級の真ん中の値を何と呼ぶか。", options: ["中央値", "階級値", "代表値", "相対度数"], correct: 1, explanation: "階級の幅のちょうど中央にある値を「階級値」と呼びます。例えば「10以上〜20未満」の階級値は (10+20)÷2 = 15 です。"},
                {q: "ある階級の度数を、全体の度数の合計で割った値（全体の何割か）を何と呼ぶか。", options: ["累積度数", "相対度数", "階級値", "平均度数"], correct: 1, explanation: "全体に対する割合を示したものが「相対度数」です。すべての階級の相対度数を足すと必ず 1.0 になります。"},
                {q: "最初の階級からある階級までの度数（または相対度数）を次々と足し合わせたものを何と呼ぶか。", options: ["累積度数", "最大度数", "限界度数", "相加度数"], correct: 0, explanation: "順に足し上げていくことで、「〇〇以下の人が全体で何人（何％）いるか」がすぐに分かる指標を「累積度数（または累積相対度数）」と呼びます。"},
                {q: "2つの質的変数（例：「性別」と「好きな科目」）について、縦横に項目を配置して該当する度数を集計した表を何と呼ぶか。", options: ["度数分布表", "クロス集計表", "相関表", "乱数表"], correct: 1, explanation: "2つの項目を掛け合わせて（クロスさせて）集計した表をクロス集計表（または分割表、2元表）と呼びます。"},
                {q: "クロス集計表の右端や下端に計算される、それぞれの変数の「合計」の分布を何と呼ぶか。", options: ["条件付き分布", "周辺分布", "正規分布", "同時分布"], correct: 1, explanation: "クロス集計表の「周辺（端っこ）」に書かれる全体の合計値の分布を「周辺分布」と呼びます。"},
                {q: "時系列データにおいて、季節や曜日による周期的な変動（季節変動）や不規則な変動をなめらかにして、長期的な傾向（トレンド）を見やすくする計算手法を何というか。", options: ["指数化", "標準化", "移動平均", "最小二乗法"], correct: 2, explanation: "前後数日（数ヶ月）のデータの平均を計算しながらズラしていくことで、ギザギザしたグラフを滑らかにする手法を「移動平均」と呼びます。"},
                {q: "ある特定の時点（基準時）のデータ値を「100」とし、他の時点のデータがその何倍（何%）にあたるかを表した時系列の指標を何というか。", options: ["偏差値", "変動係数", "指数", "Zスコア"], correct: 2, explanation: "消費者物価指数や日経平均株価のように、基準からの変化率を分かりやすくするために100を基準として算出した数値を「指数（インデックス）」と呼びます。"},
                {q: "時系列データが持つ4つの変動要因は「傾向変動」「循環変動」「不規則変動」と、もう一つは何か。", options: ["気候変動", "季節変動", "価格変動", "為替変動"], correct: 1, explanation: "1年ごとの周期（夏にアイスが売れるなど）や、1週間の周期（土日に客が増えるなど）で繰り返される変化を「季節変動」と呼びます。"},
                {q: "アンケートで「あなたはスマートフォンを持っていますか？また、毎日3時間以上使いますか？」と1つの質問で聞くことの問題点を表す用語はどれか。", options: ["誘導尋問", "ダブルバーレル質問", "キャリーオーバー効果", "社会的望ましさバイアス"], correct: 1, explanation: "1つの質問の中に2つ以上の論点が含まれており、回答者がどちらに対して答えていいか分からなくなる悪い質問文を「ダブルバーレル質問」と呼びます。"},
                {q: "データの一部が測定ミス等で欠けている値を「欠損値」という。欠損値の処理として一般的に不適切なものはどれか。", options: ["欠損値を含むデータを分析から除外する", "平均値などで欠損値を埋める（補完する）", "欠損している理由を推測して対応を変える", "何も考えずにすべて「0」として計算する"], correct: 3, explanation: "体重のデータが欠損しているのに「0kg」として平均を計算すると、結果が大きく歪んでしまいます。一律に0とするのは非常に危険です。"},
                {q: "調査対象者がアンケートに回答しなかったり、不在で調査できなかったりすることで生じるデータの偏りを何というか。", options: ["標本誤差", "無回答誤差", "測定誤差", "入力誤差"], correct: 1, explanation: "「回答しなかった人」に共通の特徴（例：忙しい人、そのテーマに興味がない人）がある場合、結果が母集団の真の姿からズレてしまいます。これを無回答誤差と呼びます。"},
                {q: "折れ線グラフと棒グラフを1つの図表の中に重ねて描いたグラフを何と呼ぶか。", options: ["モザイク図", "散布図", "複合グラフ", "レーダーチャート"], correct: 2, explanation: "降水量（棒グラフ）と気温（折れ線グラフ）のように、単位や尺度が異なる2つの指標を同時に比較するために用いられるものを「複合グラフ」と呼びます。"},
                {q: "散布図において、点が右上がりの直線付近に密集している場合、2変数にはどのような関係があると言えるか。", options: ["強い正の相関", "強い負の相関", "無相関", "因果関係"], correct: 0, explanation: "一方が増えるともう一方も増える傾向があることを「正の相関」、逆に減る傾向を「負の相関」と呼びます。因果関係があるかどうかは散布図だけでは決まりません。"}
            ],
            graph: [
                {q: "データ {4, 6, 8, 10, 100} において、平均値と中央値はそれぞれいくらか。", options: ["平均値:25.6, 中央値:8", "平均値:8, 中央値:25.6", "平均値:25.6, 中央値:10", "平均値:100, 中央値:8"], correct: 0, explanation: "平均値は (4+6+8+10+100)÷5 = 128÷5 = 25.6。中央値は小さい順に並べた真ん中なので 8 です。極端な値(100)の影響で平均値が大きく引き上げられています。"},
                {q: "度数分布表において、最も度数（人数など）が多い階級の階級値を何というか。", options: ["平均値", "中央値", "最頻値（モード）", "最大値"], correct: 2, explanation: "最も頻繁に現れる値、つまり度数が一番大きい階級の代表値（階級値）を「最頻値」と呼びます。"},
                {q: "データの最大値から最小値を引いた値を何というか。", options: ["分散", "範囲（レンジ）", "四分位範囲", "標準偏差"], correct: 1, explanation: "データがどれくらいの幅に散らばっているかを表す最も簡単な指標が「範囲（レンジ）」です。"},
                {q: "データを小さい順に並べ、下から25%（4分の1）にあたる位置の値を何というか。", options: ["第1四分位数", "第2四分位数（中央値）", "第3四分位数", "四分位範囲"], correct: 0, explanation: "データを4等分する区切りを四分位数といいます。下から25%が第1（Q1）、50%が第2（中央値・Q2）、75%が第3（Q3）四分位数です。"},
                {q: "「第3四分位数 － 第1四分位数」で求められる、データの中央50%が収まる幅を何というか。", options: ["範囲", "分散", "四分位範囲", "四分位偏差"], correct: 2, explanation: "四分位範囲（IQR）は、極端に大きい（小さい）外れ値の影響を受けにくいため、散らばりの指標として非常に優れています。"},
                {q: "箱ひげ図において、箱の中を通る縦線（または横線）は何を表しているか。", options: ["平均値", "中央値", "最頻値", "標準偏差"], correct: 1, explanation: "箱の下端が第1四分位数、上端が第3四分位数、そして箱の中の線は「中央値（第2四分位数）」を表します。平均値ではありません。"},
                {q: "箱ひげ図の外側に「×」や「〇」などの点で打たれるデータは、一般的に何を表しているか。", options: ["平均値", "外れ値（異常値）", "最頻値", "欠損値"], correct: 1, explanation: "箱（四分位範囲）から一定以上離れた極端なデータは「外れ値」として、ひげ（線）には含めずに個別の点としてプロットするのが一般的です。"},
                {q: "各データの十の位を「幹」、一の位を「葉」として数値を書き並べ、ヒストグラムのような形を作りつつ元の数値も残せる図を何というか。", options: ["箱ひげ図", "モザイク図", "幹葉図（みきはず）", "散布図"], correct: 2, explanation: "幹葉図は、データの分布の形を見ながら、具体的な数値（生データ）も確認できるという特徴を持つグラフです。"},
                {q: "分散を計算する手順として正しいものはどれか。", options: ["(各データ － 平均値) の平均", "(各データ － 平均値)の2乗 の平均", "(各データの2乗) の平均", "最大値 － 最小値"], correct: 1, explanation: "偏差（データと平均の差）をそのまま足すとゼロになるため、それぞれを「2乗」してから平均したものが分散です。"},
                {q: "標準偏差とは、分散に対してどのような計算を行ったものか。", options: ["分散を2で割る", "分散を2乗する", "分散の正の平方根をとる", "分散の逆数をとる"], correct: 2, explanation: "分散は計算過程でデータを2乗しているため単位が変わってしまいます（例：cm²）。これを元の単位（cm）に戻すためにルート（平方根）をとったのが標準偏差です。"},
                {q: "分散を計算する別公式「(〇〇の平均) － (平均の2乗)」の〇〇に入るものは何か。", options: ["絶対値", "データの2乗", "偏差", "平方根"], correct: 1, explanation: "分散は「データの2乗の平均 － 平均値の2乗」でも計算できます。計算の手間を省くためによく使われる重要な公式です。"},
                {q: "データ全体に一律で「+10」したとき、標準偏差はどう変化するか。", options: ["+10される", "+100される", "変化しない", "0になる"], correct: 2, explanation: "全員の点数を10点上げても、データの「ばらつき具合（散らばり）」は全く変わらないため、分散も標準偏差も変化しません。"},
                {q: "データ全体をすべて「3倍」したとき、分散と標準偏差は元の何倍になるか。", options: ["分散は3倍、標準偏差は3倍", "分散は9倍、標準偏差は3倍", "分散は3倍、標準偏差は9倍", "変化しない"], correct: 1, explanation: "データをa倍すると、散らばり幅（標準偏差）もa倍になります。分散は標準偏差の2乗なので、a²倍（3²＝9倍）になります。"},
                {q: "標準化（Zスコア化）とは、データから平均を引き、何で割る変換のことか。", options: ["データ数", "分散", "標準偏差", "中央値"], correct: 2, explanation: "平均を引き、標準偏差で割ることで、データは「平均が0、標準偏差が1」の統一されたスケール（Zスコア）に変換されます。"},
                {q: "偏差値の計算式は「 Zスコア（標準化された値） × 10 ＋ 〇〇 」である。〇〇に入るのは？", options: ["10", "50", "100", "0"], correct: 1, explanation: "偏差値は、平均点を取った人が「50」になるように作られた指標です。Zスコア（平均から何標準偏差離れているか）を10倍して50を足します。"},
                {q: "単位や平均値が大きく異なる2つのデータ（例：ネズミとゾウの体重）のばらつきを比較するための指標「変動係数」の計算式はどれか。", options: ["標準偏差 ÷ 平均値", "分散 ÷ 平均値", "標準偏差 × 平均値", "四分位範囲 ÷ 中央値"], correct: 0, explanation: "変動係数（CV）は、標準偏差が平均値の何割にあたるかを示す単位のない指標（割合）です。相対的なばらつきの大きさを比較できます。"},
                {q: "1組30人の平均が60点、2組20人の平均が70点だった。学年全体（50人）の平均点は何点か。", options: ["64点", "65点", "66点", "67.5点"], correct: 0, explanation: "人数の重みを考慮した「加重平均」を求めます。(60×30 + 70×20) ÷ 50 = (1800 + 1400) ÷ 50 = 3200 ÷ 50 = 64点です。"},
                {q: "累積相対度数グラフにおいて、縦軸の「0.5（50%）」のラインから水平に線を引き、グラフとぶつかった点から横軸に下ろした値は、近似的に何を表すか。", options: ["平均値", "中央値", "最頻値", "第1四分位数"], correct: 1, explanation: "累積で50%に達する位置は、データを小さい順に並べたときのちょうど真ん中、すなわち中央値（メジアン）に相当します。"},
                {q: "2つの変数 X と Y の関係を示す指標である「共分散」が正の値をとるとき、散布図はどのような傾向を示すか。", options: ["右下がり", "右上がり", "円状に広がる", "水平"], correct: 1, explanation: "共分散が正のときは、Xが平均より大きいとYも大きい傾向があり、「右上がり（正の相関）」の形になります。負のときは右下がりになります。"},
                {q: "相関係数 r は共分散を用いてどのように計算されるか。", options: ["共分散 ÷ (Xの分散 × Yの分散)", "共分散 ÷ (Xの標準偏差 × Yの標準偏差)", "共分散 × (Xの標準偏差 × Yの標準偏差)", "共分散 － (Xの平均 × Yの平均)"], correct: 1, explanation: "共分散は単位に依存して値の大きさが変わるため、XとYの標準偏差で割ることで、必ず -1 から 1 の間に収まる「相関係数」に変換します。"},
                {q: "相関係数に関する説明で誤っているものはどれか。", options: ["-1 から 1 までの値をとる", "0に近いほど相関が弱い（無相関）", "相関係数が1のとき、すべての点が完全に一直線上に並ぶ", "曲線的な関係（U字型など）が強いとき、相関係数は1になる"], correct: 3, explanation: "相関係数（ピアソンの積率相関係数）はあくまで「直線的」な関係の強さを測るものです。きれいなU字型の関係があっても、相関係数は0に近くなります。"},
                {q: "「アイスクリームの売上」と「水難事故の件数」には強い正の相関がある。これは「気温」という第3の要因が背後にあるためである。このような表面上の相関を何と呼ぶか。", options: ["自己相関", "負の相関", "擬似相関（見かけの相関）", "因果関係"], correct: 2, explanation: "直接の原因・結果の関係（因果関係）はないのに、別の共通原因（交絡変数）によって相関があるように見えることを擬似相関と呼びます。"},
                {q: "相関係数は、極端に外れた値（外れ値）の影響を【　　】。", options: ["全く受けない", "受けにくい", "強く受ける", "外れ値があると必ず0になる"], correct: 2, explanation: "相関係数は平均値や分散を用いて計算されるため、平均値と同様に外れ値の影響を非常に強く受けます。1つの外れ値で相関が大きく変わることがあります。"},
                {q: "散布図上の点に最もよく当てはまる直線（回帰直線）を引く際、各点と直線との「縦方向のズレ（残差）」の【何】を最小にするように直線を決めるか。", options: ["絶対値の和", "2乗の和", "平均値", "最大値"], correct: 1, explanation: "ズレ（残差）を2乗したものの合計が最も小さくなるように直線を引く手法を「最小二乗法」と呼びます。回帰直線を求める基本原理です。"},
                {q: "回帰直線 Y = aX + b において、a（傾き）を何と呼ぶか。", options: ["相関係数", "決定係数", "回帰係数", "共分散"], correct: 2, explanation: "傾き a を「回帰係数」と呼びます。「Xが1単位増えたとき、Yが平均してどれくらい増えるか」を表す重要な数値です。"},
                {q: "「気温(X)」から「売上(Y)」を予測する回帰直線が Y = 50X + 200 だった。気温が 30℃ のときの予測売上はいくらか。", options: ["250", "1500", "1700", "2000"], correct: 2, explanation: "回帰直線の式に X = 30 を代入して計算します。 Y = 50 × 30 + 200 = 1500 + 200 = 1700 となります。"},
                {q: "各データと平均値の差（偏差）について、「絶対値」をとってから平均した散らばりの指標を何というか。", options: ["分散", "標準偏差", "平均偏差", "四分位範囲"], correct: 2, explanation: "偏差の2乗の平均が分散ですが、2乗せずに「絶対値」をとってマイナスを消し、その平均をとったものを「平均偏差」と呼びます。"},
                {q: "回帰直線は、必ずある特定の点を通る。それはどの点か。", options: ["原点 (0, 0)", "(Xの中央値, Yの中央値)", "(Xの平均値, Yの平均値)", "(Xの最大値, Yの最大値)"], correct: 2, explanation: "最小二乗法で求めた回帰直線は、必ず Xの平均値と Yの平均値の交点（重心）を通るという数学的な性質を持っています。"},
                {q: "ヒストグラムが右に長く裾を引く（右に歪んだ）形をしているとき、平均値、中央値、最頻値の一般的な大小関係は？", options: ["平均値 < 中央値 < 最頻値", "最頻値 < 中央値 < 平均値", "中央値 < 平均値 < 最頻値", "すべて等しい"], correct: 1, explanation: "右に裾が長い場合、一部の巨大なデータに引っ張られて「平均値」が一番大きくなります。山の頂点である「最頻値」が一番小さくなります。"},
                {q: "平均値が 50、分散が 16 のデータがある。このデータのすべての値を「2倍して 5を足した」とき、新しい平均値と標準偏差はどうなるか。", options: ["平均105, 標準偏差8", "平均105, 標準偏差32", "平均105, 標準偏差16", "平均55, 標準偏差4"], correct: 0, explanation: "平均はそのまま (50×2)+5 = 105。元の標準偏差は √16 = 4。標準偏差は「足し算」の影響は受けず「2倍」だけされるため、4×2 = 8 となります。"}
            ],
            prob: [
                {q: "絶対に起こる事象の確率を P としたとき、P の値はいくらか。", options: ["0", "0.5", "1", "100"], correct: 2, explanation: "確率は0から1の間の実数で表されます。絶対に起こる事象（全事象）の確率は1（100%）です。"},
                {q: "2つの事象 A と B が互いに排反（同時に起こらない）であるとき、「AまたはBが起こる確率 P(A∪B)」はどう計算するか。", options: ["P(A) × P(B)", "P(A) ＋ P(B)", "P(A) － P(B)", "1 － P(A)P(B)"], correct: 1, explanation: "同時に起こらない事象の「または（和事象）」の確率は、単純にそれぞれの確率を足し算します（確率の加法定理）。"},
                {q: "コインを投げる結果と、サイコロを投げる結果のように、互いに影響を与えない試行を何というか。", options: ["排反試行", "従属試行", "独立試行", "反復試行"], correct: 2, explanation: "お互いの結果がもう一方の確率に全く影響を与えない試行を「独立試行」と呼びます。独立な事象が同時に起こる確率は「掛け算（乗法定理）」で求めます。"},
                {q: "「少なくとも1回は当たりが出る確率」を求める際、計算を簡単にするためによく使われる考え方はどれか。", options: ["条件付き確率", "余事象の確率", "ベイズの定理", "大数の法則"], correct: 1, explanation: "「少なくとも1回当たる」の反対（余事象）は「すべてハズレる」です。 1 - (すべてハズレる確率) で計算するのが鉄則です。"},
                {q: "ジョーカーを除く52枚のトランプから1枚引くとき、そのカードが「ハート」または「エース」である確率はいくらか。", options: ["16/52", "17/52", "13/52", "4/52"], correct: 0, explanation: "ハートは13枚、エースは4枚。しかし「ハートのエース(1枚)」が重複しています。 P(ハート∪エース) = 13/52 + 4/52 - 1/52 = 16/52 となります。"},
                {q: "袋に赤玉3個と白玉2個がある。ここから同時に2個取り出すとき、2個とも赤玉である確率は？", options: ["1/10", "3/10", "6/25", "9/25"], correct: 1, explanation: "5個から2個選ぶ全通りは 5C2 = 10通り。赤玉3個から2個選ぶのは 3C2 = 3通り。確率は 3/10 です。"},
                {q: "事象Aが起こったという条件のもとで、事象Bが起こる確率を何というか。", options: ["同時確率", "周辺確率", "条件付き確率", "事後確率"], correct: 2, explanation: "「サイコロで偶数が出たと分かったとき、それが4以上である確率」のように、情報が追加された状態での確率を「条件付き確率」と呼びます。"},
                {q: "サイコロを何度も繰り返し投げると、1の目が出る割合（相対度数）は試行回数を増やすほど理論的な確率である 1/6 に近づいていく。この法則は？", options: ["中心極限定理", "大数の法則", "チェビシェフの不等式", "ベイズの定理"], correct: 1, explanation: "試行回数を無限に大きくすると、実際の割合が理論上の確率に収束していくという統計の基本定理を「大数の法則（たいすうのほうそく）」と呼びます。"},
                {q: "1回100円のくじで、10%で500円、90%で0円が当たる。賞金の期待値はいくらか。", options: ["10円", "50円", "100円", "500円"], correct: 1, explanation: "期待値（平均して得られる値）は、「値 × 確率」の合計です。 500円 × 0.1 ＋ 0円 × 0.9 ＝ 50円 となります。"},
                {q: "確率変数 X の期待値 E(X) が 10 のとき、新しい変数 Y = 3X + 5 の期待値 E(Y) はいくらか。", options: ["10", "15", "30", "35"], correct: 3, explanation: "期待値には「線形性」があり、定数倍や足し算がそのまま期待値にも適用されます。 E(3X+5) = 3E(X) + 5 = 3×10 + 5 = 35。"},
                {q: "独立な2つの確率変数 X と Y において、和の分散 V(X+Y) を表す式として正しいものは？", options: ["V(X) + V(Y)", "V(X) × V(Y)", "V(X) + V(Y) + 2", "(V(X) + V(Y))²"], correct: 0, explanation: "XとYが「独立（無関係）」である場合のみ、和の分散はそれぞれの分散の足し算になります。これを分散の加法性といいます。"},
                {q: "確率変数 X の分散 V(X) の定義式（期待値 E を使った表現）として正しいものはどれか。※μはXの期待値", options: ["E(X²)", "E( (X - μ)² )", "( E(X - μ) )²", "E(X) - μ²"], correct: 1, explanation: "分散は「データと平均（期待値μ）の差の2乗」の平均（期待値）です。したがって E( (X - μ)² ) と表されます。"},
                {q: "「1回の試行で成功する確率が p である実験を n 回独立に繰り返したときの成功回数」が従う確率分布を何というか。", options: ["一様分布", "ポアソン分布", "正規分布", "二項分布"], correct: 3, explanation: "「コインを10回投げて表が出る回数」や「打率3割の打者が5打席でヒットを打つ回数」などは、二項分布（記号 B(n, p)）に従います。"},
                {q: "サイコロを3回投げるとき、ちょうど2回「1の目」が出る確率を求める計算式はどれか。", options: ["(1/6)² × (5/6)", "3C2 × (1/6)² × (5/6)", "3P2 × (1/6)² × (5/6)", "3C2 × (1/6)³"], correct: 1, explanation: "反復試行（二項分布）の確率です。3回のうち「どの2回」で成功するかの組み合わせ 3C2 を掛け、成功確率(1/6)の2乗、失敗確率(5/6)の1乗を掛け合わせます。"},
                {q: "確率変数 X が 二項分布 B(n, p) に従うとき、X の期待値（平均）を求める式はどれか。", options: ["n / p", "n + p", "n × p", "n × p × (1-p)"], correct: 2, explanation: "試行回数 n と成功確率 p を掛けたものが期待値になります。例えばコインを10回（n=10）、表の確率1/2（p=0.5）なら、期待値は 10 × 0.5 = 5回です。"},
                {q: "自然界や社会のデータの多くが従う、左右対称な釣鐘型の連続型確率分布を何というか。", options: ["一様分布", "二項分布", "正規分布", "指数分布"], correct: 2, explanation: "身長やテストの点数、誤差などは、平均値付近が最も多く、離れるほどなだらかに減る「正規分布（ガウス分布）」に従うことが多いです。"},
                {q: "正規分布を扱いやすくするために、平均を 0、標準偏差を 1 に変換した分布を何と呼ぶか。", options: ["標準正規分布", "対数正規分布", "T分布", "カイ二乗分布"], correct: 0, explanation: "データを標準化（Zスコア化）すると、どのような正規分布も「平均0、標準偏差1」の「標準正規分布」になり、確率の計算が容易になります。"},
                {q: "正規分布において、「平均 ± 標準偏差（1σ）」の範囲には、全データの約何％が含まれるか。", options: ["約50%", "約68%", "約95%", "約99.7%"], correct: 1, explanation: "正規分布の有名な性質です。±1σに約68%、±2σに約95%、±3σに約99.7%が含まれます。統計学で非常によく使われる数値です。"},
                {q: "二項分布 B(n, p) は、試行回数 n が十分に大きいとき、どのような分布に近づく（近似できる）か。", options: ["一様分布", "ポアソン分布", "正規分布", "幾何分布"], correct: 2, explanation: "ド・モアブル＝ラプラスの定理と呼ばれ、nが大きい場合、二項分布は「平均 np、分散 np(1-p) の正規分布」とみなして計算することができます。"},
                {q: "母集団（平均μ、分散σ²）から大きさ n の標本を無作為抽出した。このとき「標本平均」の期待値はどうなるか。", options: ["μ / n", "μ", "μ × n", "0"], correct: 1, explanation: "標本平均の期待値（何度も標本抽出したときの標本平均の平均）は、元の母集団の平均（母平均 μ）にピタリと一致します（不偏性）。"},
                {q: "上記と同じ条件において、「標本平均」の分散はどうなるか。", options: ["σ²", "σ² × n", "σ² / n", "σ² / √n"], correct: 2, explanation: "標本平均の分散は、元の母集団の分散を「サンプルサイズ n」で割ったもの（σ²/n）になります。nが大きい（たくさん調査する）ほど分散が小さくなり、母平均に近い値が出やすくなります。"},
                {q: "母集団がどんな分布であっても、サンプルサイズ n が大きいとき、「標本平均の分布」は正規分布に近づく。この定理を何というか。", options: ["大数の法則", "中心極限定理", "ベイズの定理", "ピタゴラスの定理"], correct: 1, explanation: "元のデータがいびつな分布でも、「平均値の分布」はサンプル数が多いほど綺麗な正規分布（釣鐘型）になるという、統計学で最も重要な定理の一つが「中心極限定理」です。"},
                {q: "標本から得られたデータを用いて、母集団の平均（母平均）などの真の値が含まれる「範囲」を確率的に推定することを何というか。", options: ["点推定", "区間推定", "仮説検定", "回帰分析"], correct: 1, explanation: "「母平均はズバリ50だ（点推定）」ではなく、「母平均は48〜52の間にあるだろう（区間推定）」と幅を持たせて推定する方法です。"},
                {q: "「信頼度95%の信頼区間」の意味として最も適切なものはどれか。", options: ["その区間内に母平均が含まれる確率が95%である", "同じ抽出と推定を100回繰り返したとき、約95回の割合でその区間に母平均が含まれる", "母集団のデータの95%がその区間に収まっている", "計算結果が95%の確率で間違っていない"], correct: 1, explanation: "母平均は動かない固定された値です。動くのは標本から計算した区間の方なので、「何度も調査して区間を作れば、100回中95回くらいは真の母平均を捉えられている」という意味になります。"},
                {q: "標本の大きさ（サンプルサイズ n）を大きくすると、信頼区間の幅はどう変化するか。", options: ["広くなる", "狭くなる", "変わらない", "nに依存しない"], correct: 1, explanation: "調査する人数（n）を増やすほど、標本平均の分散（ブレ）が小さくなるため、推定の精度が上がり、信頼区間の幅は「狭く」なります。"},
                {q: "「新しい薬は古い薬より効果がある」というような主張をデータに基づいて客観的に判定する統計学の手法を何というか。", options: ["区間推定", "仮説検定", "相関分析", "主成分分析"], correct: 1, explanation: "ある仮説を立て、手元のデータから「それが単なる偶然で起きたとは考えにくい」ことを確率的に示して結論を導く手法を「仮説検定」と呼びます。"},
                {q: "仮説検定において、「差がない」「効果がない」など、本来棄却（否定）したい目的で設定される仮説を何と呼ぶか。", options: ["対立仮説", "帰無仮説", "有意仮説", "作業仮説"], correct: 1, explanation: "「無（差がない）に帰する」という意味で帰無仮説（H0）と呼びます。これを「偶然とは考えにくい（確率が低い）」として否定（棄却）することで、本当に言いたいこと（対立仮説）を証明します。"},
                {q: "帰無仮説が正しいという前提のもとで、手元のデータ以上に極端な結果が得られる確率のことを何と呼ぶか。", options: ["有意水準", "信頼係数", "p値 (p-value)", "Zスコア"], correct: 2, explanation: "p値（ピーち）は「その結果が偶然起きる確率」のようなものです。これが設定した基準（有意水準）より小さければ「偶然とは考えにくい」と判断します。"},
                {q: "仮説検定において、帰無仮説を棄却するかどうかの基準となる確率（通常は5%や1%に設定される）を何というか。", options: ["p値", "有意水準 (α)", "信頼区間", "検出力"], correct: 1, explanation: "「p値がこの値（例えば0.05＝5%）より小さければ、偶然じゃないと判断して帰無仮説を棄却しよう」とあらかじめ決めておく基準が「有意水準（危険率）」です。"},
                {q: "ある検査で「本当は健康（陰性）なのに、誤って病気（陽性）と判定される」ように、帰無仮説が正しいのに誤って棄却してしまう過ちを何というか。", options: ["第一種の過誤 (偽陽性)", "第二種の過誤 (偽陰性)", "標準誤差", "標本誤差"], correct: 0, explanation: "「ないものをある」と間違える（あわてんぼうのエラー）を第一種の過誤、「あるものをない」と見逃す（ぼんやりもののエラー）を第二種の過誤と呼びます。"}
            ]
        };

        let currentQuiz = [];
        let index = 0;
        let score = 0;
        let isAnswered = false;

        function loadMode(mode) {
            index = 0;
            score = 0;
            
            if (mode === 'mock') {
                let allQuestions = [...quizData.data, ...quizData.graph, ...quizData.prob];
                // フィッシャー・イェーツのシャッフル
                for (let i = allQuestions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [allQuestions[i], allQuestions[j]] = [allQuestions[j], allQuestions[i]];
                }
                currentQuiz = allQuestions.slice(0, 30); // ランダム30問
            } else {
                currentQuiz = quizData[mode]; // カテゴリ別30問
            }

            document.getElementById('menu').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            showQuestion();
            window.scrollTo(0, 0);
        }

        function showQuestion() {
            isAnswered = false;
            const q = currentQuiz[index];
            
            document.getElementById('progress').innerText = `第 ${index + 1} 問 / 全 ${currentQuiz.length} 問`;
            document.getElementById('question').innerText = q.q;
            
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            q.options.forEach((o, i) => {
                const btn = document.createElement('button');
                btn.innerText = o;
                btn.className = "w-full p-4 md:p-5 border-2 border-gray-300 rounded-xl text-left hover:bg-blue-50 transition-colors font-medium bg-white text-gray-700 shadow-sm text-base md:text-lg";
                btn.onclick = () => checkAnswer(i, btn);
                optDiv.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (isAnswered) return;
            isAnswered = true;

            const q = currentQuiz[index];
            const isCorrect = selectedIndex === q.correct;
            
            const buttons = document.getElementById('options').children;
            
            if (isCorrect) {
                score++;
                btnElement.classList.replace('border-gray-300', 'border-green-500');
                btnElement.classList.replace('hover:bg-blue-50', 'bg-green-100');
                btnElement.classList.add('bg-green-100', 'text-green-900', 'font-bold');
            } else {
                btnElement.classList.replace('border-gray-300', 'border-red-500');
                btnElement.classList.replace('hover:bg-blue-50', 'bg-red-100');
                btnElement.classList.add('bg-red-100', 'text-red-900');
                
                // 正解を目立たせる
                buttons[q.correct].classList.replace('border-gray-300', 'border-green-500');
                buttons[q.correct].classList.add('bg-green-50', 'text-green-800', 'font-bold', 'ring-2', 'ring-green-400', 'ring-inset');
            }

            for(let i=0; i<buttons.length; i++){
                if(i !== selectedIndex && i !== q.correct) {
                    buttons[i].classList.add('opacity-40');
                }
                buttons[i].disabled = true; // ボタン無効化
            }

            const fb = document.getElementById('feedback');
            fb.innerHTML = `
                <div class="font-black text-xl mb-3 flex items-center ${isCorrect ? 'text-green-700' : 'text-red-700'}">
                    ${isCorrect ? '<span class="text-3xl mr-2">⭕</span> 正解！' : '<span class="text-3xl mr-2">❌</span> 不正解... (正解: ' + q.options[q.correct] + ')'}
                </div>
                <div class="text-gray-800 leading-relaxed text-base md:text-lg border-t-2 border-gray-200 pt-3 mt-2">
                    <span class="inline-block bg-gray-700 text-white text-xs font-bold px-2 py-1 rounded mb-2 shadow">解説</span><br>
                    ${q.explanation}
                </div>
            `;
            fb.className = "mt-6 p-5 md:p-6 rounded-xl shadow-inner border-2 " + (isCorrect ? "bg-green-50 border-green-200" : "bg-red-50 border-red-200");
            fb.classList.remove('hidden');
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerText = (index === currentQuiz.length - 1) ? "結果を見る" : "次の問題へ進む";
            nextBtn.classList.remove('hidden');
            
            // 解説部分まで少しスクロール
            fb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function nextQuestion() {
            index++;
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');

            if(index < currentQuiz.length) {
                showQuestion();
                window.scrollTo(0, 0);
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-container').classList.add('hidden');
            const resultContainer = document.getElementById('result-container');
            resultContainer.classList.remove('hidden');
            window.scrollTo(0, 0);
            
            const scoreElement = document.getElementById('score');
            const percentage = Math.round((score / currentQuiz.length) * 100);
            
            let message = "";
            let colorClass = "";
            
            if (percentage >= 80) {
                message = "素晴らしい！統計検定3級合格圏内です。この調子で本番に臨みましょう！🎉";
                colorClass = "text-green-600 bg-green-50 border-green-200";
            } else if (percentage >= 60) {
                message = "合格まであと一歩！間違えた問題の解説をしっかり復習すれば確実です。💪";
                colorClass = "text-blue-600 bg-blue-50 border-blue-200";
            } else {
                message = "基礎知識の確認が必要です。用語の意味や基本的な計算方法をもう一度見直しましょう。📚";
                colorClass = "text-yellow-700 bg-yellow-50 border-yellow-200";
            }

            scoreElement.innerHTML = `
                <div class="inline-block bg-white border-4 border-gray-100 rounded-2xl p-8 shadow-sm mb-6">
                    <div class="text-gray-500 font-bold mb-2">あなたの正解数</div>
                    <span class="text-6xl font-black text-gray-800">${score}</span>
                    <span class="text-3xl text-gray-400 font-bold"> / ${currentQuiz.length}</span>
                    <div class="mt-4 text-2xl font-black ${percentage >= 70 ? 'text-green-500' : 'text-blue-500'}">正答率: ${percentage}%</div>
                </div>
                <div class="p-6 border-2 rounded-xl text-lg font-bold leading-relaxed ${colorClass}">
                    ${message}
                </div>
            `;
        }
    </script>
</body>
</html>
