<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>情報I 対策80問ドリル</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-dark: #1e3a8a;
      --border: #dbe3ef;
      --green-bg: #dcfce7;
      --green: #15803d;
      --red-bg: #fee2e2;
      --red: #b91c1c;
      --yellow-bg: #fef9c3;
      --slate: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", system-ui, sans-serif;
      background: radial-gradient(circle at top, #e0f2fe 0, var(--bg) 42%, #eef2ff 100%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
    }
    .app { width: min(920px, 94vw); margin: 0 auto; padding: 28px 0 48px; }
    .card {
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--border);
      border-radius: 26px;
      box-shadow: 0 16px 42px rgba(15, 23, 42, 0.10);
      padding: clamp(20px, 4vw, 34px);
    }
    .home { max-width: 760px; margin: 24px auto; text-align: center; }
    h1 { margin: 0 0 10px; color: var(--primary-dark); font-size: clamp(28px, 5vw, 42px); line-height: 1.25; }
    h2 { margin: 0 0 16px; color: var(--primary-dark); }
    .lead { color: var(--slate); margin: 0 auto 24px; max-width: 680px; text-align: left; }
    .pill-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 18px 0 28px; }
    .pill { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; padding: 5px 12px; border-radius: 999px; font-size: 13px; font-weight: 700; }
    button {
      font: inherit;
      cursor: pointer;
      border: none;
      transition: transform .08s ease, box-shadow .12s ease, border-color .12s ease, background .12s ease;
    }
    button:active { transform: translateY(1px); }
    button:disabled { cursor: default; }
    .primary-btn {
      width: 100%;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      border-radius: 18px;
      padding: 18px 20px;
      font-weight: 800;
      font-size: 18px;
      box-shadow: 0 12px 24px rgba(37,99,235,.25);
      margin: 6px 0 18px;
    }
    .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 12px; text-align: left; }
    .category-btn {
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 14px 15px;
      font-weight: 800;
      color: #334155;
      min-height: 72px;
    }
    .category-btn:hover, .option-btn:hover { border-color: #93c5fd; box-shadow: 0 8px 18px rgba(15,23,42,.08); }
    .small { color: var(--muted); font-size: 13px; font-weight: 600; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .progress-wrap { flex: 1 1 260px; }
    .progress-text { display:flex; justify-content:space-between; font-size: 13px; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
    .progress { height: 10px; background:#e2e8f0; border-radius:999px; overflow:hidden; }
    .progress > div { height:100%; background: linear-gradient(90deg, #60a5fa, #2563eb); width:0%; }
    .ghost-btn { background: #f8fafc; color:#334155; border: 1px solid var(--border); border-radius: 12px; padding: 9px 13px; font-weight: 800; }
    .category-label { display:inline-block; color:#1d4ed8; background:#eff6ff; border:1px solid #bfdbfe; border-radius:999px; padding:3px 10px; font-size:12px; font-weight:800; margin-bottom: 12px; }
    .question { font-size: clamp(18px, 3.2vw, 23px); font-weight: 800; line-height: 1.65; margin: 4px 0 22px; }
    .options { display:grid; gap: 12px; }
    .option-btn {
      width:100%;
      text-align:left;
      background:#fff;
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
      font-weight: 750;
      display:flex;
      gap: 10px;
      align-items:flex-start;
    }
    .option-mark { min-width: 28px; height:28px; border-radius: 999px; display:inline-grid; place-items:center; background:#eef2ff; color:#1e40af; font-weight:900; }
    .correct { background: var(--green-bg); border-color: #22c55e; color: #14532d; }
    .wrong { background: var(--red-bg); border-color: #ef4444; color: #7f1d1d; }
    .dim { background:#f8fafc; color:#64748b; }
    .explain { margin-top: 22px; border-radius: 22px; overflow:hidden; border:1px solid var(--border); }
    .judge { padding: 13px 16px; font-weight: 900; }
    .judge.ok { background: var(--green-bg); color: var(--green); }
    .judge.ng { background: var(--red-bg); color: var(--red); }
    .explain-body { background:#f8fafc; padding: 18px; }
    .explain h3 { margin: 0 0 8px; font-size: 16px; color:#0f172a; }
    .explain p { margin: 0 0 12px; }
    .point-box { background: #fff; border-left: 5px solid #2563eb; padding: 12px 14px; border-radius: 12px; margin: 12px 0; }
    .hint-box { background: var(--yellow-bg); border: 1px solid #fde68a; padding: 12px 14px; border-radius: 12px; margin: 12px 0; }
    .next-btn { width:100%; background:#0f172a; color:#fff; border-radius: 15px; padding: 14px; font-weight:900; margin-top: 10px; }
    .result { max-width: 840px; margin: 24px auto; }
    .score { font-size: clamp(28px, 6vw, 52px); font-weight: 950; color: var(--primary-dark); line-height:1.1; }
    .result-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 12px; margin: 22px 0; }
    .stat { background:#f8fafc; border:1px solid var(--border); border-radius: 16px; padding: 14px; }
    .stat b { display:block; font-size: 24px; color:#0f172a; }
    .review-list { display:grid; gap: 12px; margin-top: 16px; }
    .review-item { background:#fff; border:1px solid var(--border); border-radius: 16px; padding: 14px; text-align:left; }
    .review-item .q { font-weight: 850; margin-bottom: 8px; }
    .toolbar { display:flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
    .toolbar .primary-btn, .toolbar .ghost-btn { width:auto; flex: 1 1 200px; margin:0; text-align:center; }
    .hidden { display:none; }
    @media (max-width: 560px) {
      .card { border-radius: 20px; }
      .category-grid { grid-template-columns: 1fr; }
      .option-btn { padding: 13px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="home" class="home card">
      <h1>情報I 対策80問ドリル</h1>
      <p class="lead">
        情報Iで出やすい用語を、4択で確認できます。答えた後には、単なる正解だけでなく「なぜその答えになるのか」「似た言葉とどう区別するのか」が表示されます。授業後の確認、小テスト前の復習、自習用に使えます。
      </p>
      <div class="pill-row">
        <span class="pill">HTMLだけで動作</span>
        <span class="pill">ランダム出題</span>
        <span class="pill">分野別練習</span>
        <span class="pill">間違い復習つき</span>
      </div>
      <button class="primary-btn" onclick="startQuiz('all')">全80問ランダム開始</button>
      <h2>分野を選んで練習</h2>
      <div id="categoryGrid" class="category-grid"></div>
    </section>

    <section id="quiz" class="card hidden">
      <div class="topbar">
        <button class="ghost-btn" onclick="goHome()">ホームへ</button>
        <div class="progress-wrap">
          <div class="progress-text"><span id="progressText">1 / 80</span><span id="scoreText">正解 0</span></div>
          <div class="progress"><div id="progressBar"></div></div>
        </div>
      </div>
      <span id="categoryLabel" class="category-label"></span>
      <div id="questionText" class="question"></div>
      <div id="options" class="options"></div>
      <div id="explain" class="explain hidden"></div>
    </section>

    <section id="result" class="result card hidden">
      <h1>結果</h1>
      <div class="score" id="finalScore"></div>
      <div class="result-grid">
        <div class="stat"><span class="small">出題数</span><b id="totalCount"></b></div>
        <div class="stat"><span class="small">正解数</span><b id="correctCount"></b></div>
        <div class="stat"><span class="small">正答率</span><b id="rate"></b></div>
      </div>
      <div id="reviewArea"></div>
      <div class="toolbar">
        <button class="primary-btn" onclick="restartSame()">同じ分野でもう一度</button>
        <button class="ghost-btn" onclick="goHome()">ホームへ戻る</button>
      </div>
    </section>
  </main>

  <script>
    const allQuestions = [
  // --- 既存の50問 ---
  { category: "情報とメディア", question: "情報の伝達や通信の仲立ちとして使われるメディア（例：電話回線、インターネット）を何というか。", options: ["表現メディア", "伝達メディア", "記録メディア", "通信メディア"], answer: 1, explanation: "伝達メディアは情報を離れた場所に伝える経路を指します。" },
  { category: "情報とメディア", question: "情報の記録や蓄積に使われるメディアの例として、適切なものはどれか。", options: ["書籍", "手帳", "画像", "ジェスチャー"], answer: 1, explanation: "記録メディアは情報を保存しておく媒体（手帳、メモリなど）です。" },
  { category: "情報とメディア", question: "情報の特性に関する記述のうち、誤っているものはどれか。", options: ["残存性がある", "伝播性がある", "情報にははっきりとした形がある", "複製性がある"], answer: 2, explanation: "情報には形がありません（無形性）。" },
  { category: "情報とメディア", question: "得られた情報が自分にとって価値があるかどうかは、受け手によって異なる。この特性を何というか。", options: ["残存性", "伝播性", "個別性", "複製性"], answer: 2, explanation: "価値の感じ方は受け手によって異なるのが個別性です。" },
  { category: "情報とメディア", question: "情報の信憑性を確かめる方法として、適切でないものはどれか。", options: ["クロスチェック", "発信日の確認", "発信元の確認", "自分の意見との一致を確認"], answer: 3, explanation: "自分の意見と合うかどうかで判断するのは確証バイアスです。" },
  { category: "情報とメディア", question: "情報を読み解き、利用する力を何というか。", options: ["メディアリテラシー", "情報デザイン", "デジタルディバイド", "情報モラル"], answer: 0, explanation: "メディアリテラシーは情報を活用する総合的な能力です。" },
  { category: "問題解決と発想法", question: "問題解決の5つのプロセスの順番として正しいものはどれか。", options: ["発見→定義→計画→実行→振り返り", "定義→発見→実行→計画→振り返り", "発見→計画→定義→実行→振り返り", "定義→発見→計画→実行→振り返り"], answer: 0, explanation: "発見→定義→計画→実行→振り返りが標準的な流れです。" },
  { category: "問題解決と発想法", question: "問題解決のプロセスにおいて、最も重要なことは何か。", options: ["解決策を1つに絞る", "現実と理想の差を把握する", "他者の評価", "技術の活用"], answer: 1, explanation: "問題＝理想と現状の差、です。" },
  { category: "問題解決と発想法", question: "ブレーンストーミングのルールとして、誤っているものはどれか。", options: ["他人の意見を批判する", "自由奔放", "質より量", "便乗歓迎"], answer: 0, explanation: "批判は厳禁です。" },
  { category: "問題解決と発想法", question: "KJ法について、誤っているものはどれか。", options: ["1枚1概念", "無理にグルーピングしない", "最初に名前をつける", "柔らかい言葉で書く"], answer: 2, explanation: "名前（表札）は後からつけます。" },
  { category: "問題解決と発想法", question: "中心から放射状に枝分かれさせて描く発想法を何というか。", options: ["ブレスト", "KJ法", "マインドマップ", "クロスチェック"], answer: 2, explanation: "マインドマップは放射状の思考ツールです。" },
  { category: "情報モラルと技術", question: "偽サイトで情報を盗む手法を何というか。", options: ["ソーシャルエンジニアリング", "フィッシング", "スパム", "ランサムウェア"], answer: 1, explanation: "フィッシング詐欺です。" },
  { category: "情報モラルと技術", question: "心理的な隙やミスを利用して情報を得る手法を何というか。", options: ["ソーシャルエンジニアリング", "フィッシング", "ハッキング", "クラッキング"], answer: 0, explanation: "人間関係の隙を突くのがソーシャルエンジニアリングです。" },
  { category: "情報モラルと技術", question: "写真のGPS情報を何というか。", options: ["Exif (ジオタグ)", "Cookie", "IPアドレス", "キャッシュ"], answer: 0, explanation: "Exifデータ内のジオタグで場所が特定されます。" },
  { category: "情報モラルと技術", question: "商品ロゴなどを保護する権利は？", options: ["著作権", "商標権", "特許権", "意匠権"], answer: 1, explanation: "ロゴやブランドは商標権です。" },
  { category: "情報モラルと技術", question: "他人の著作物を一定のルールで使うことを何というか。", options: ["複製", "引用", "転載", "盗作"], answer: 1, explanation: "引用のルールを守れば許可は不要です。" },
  { category: "情報モラルと技術", question: "自由に使っていいと意思表示する仕組みを何というか。", options: ["クリエイティブ・コモンズ", "フリーウェア", "パブリックドメイン", "シェアウェア"], answer: 0, explanation: "CCライセンスのことです。" },
  { category: "情報モラルと技術", question: "著作権が発生するのは？", options: ["思案時", "創作時", "公開時", "登録時"], answer: 1, explanation: "創作した時点で自動発生します。" },
  { category: "情報モラルと技術", question: "著作権法の保護対象はどれ？", options: ["ペンのデザイン提案", "新しい発明", "ロゴマーク", "ダンスの振り付け"], answer: 3, explanation: "ダンスは著作物です。" },
  { category: "情報モラルと技術", question: "SNS利用で正しいのは？", options: ["誹謗中傷に最適", "削除すれば消える", "匿名なら安全", "プライバシー公開に注意"], answer: 3, explanation: "ネット上の情報の完全消去は困難です。" },
  { category: "情報モラルと技術", question: "SNSで見知らぬ人からDMが来た際の対応は？", options: ["返信", "間違いと指摘", "やり取り", "無視"], answer: 3, explanation: "無視するのが鉄則です。" },
  { category: "情報モラルと技術", question: "電子マネーのチップを何というか。", options: ["ARチップ", "VRチップ", "ICチップ", "IDチップ"], answer: 2, explanation: "ICチップが情報を処理します。" },
  { category: "情報モラルと技術", question: "現実錯覚体験技術を何というか。", options: ["AR", "VR", "AI", "IoT"], answer: 1, explanation: "VRは仮想現実です。" },
  { category: "情報モラルと技術", question: "長時間の画面凝視による障害を何というか。", options: ["テクノストレス", "VDT障害", "デジタルディバイド", "エコーチェンバー"], answer: 1, explanation: "VDT作業による心身への影響です。" },
  { category: "情報モラルと技術", question: "情報格差を何というか。", options: ["デジタルタトゥー", "テクノストレス", "デジタルディバイド", "インフォデミック"], answer: 2, explanation: "情報環境による格差です。" },
  { category: "ネット通信とデジタル", question: "ネットの特性で誤りは？", options: ["グループ通信容易", "売買は必ず実名", "記録が残る", "個人発信可能"], answer: 1, explanation: "匿名取引も一般的です。" },
  { category: "ネット通信とデジタル", question: "実名発信の特徴は？", options: ["自由な発言", "告発しやすい", "責任を持つ", "不確かな情報が広がる"], answer: 2, explanation: "責任を伴うのが実名です。" },
  { category: "ネット通信とデジタル", question: "文字に割り当てられた数値パターンを何というか。", options: ["フォント", "文字コード", "ピクセル", "フレーム"], answer: 1, explanation: "文字コードが文字を数値化します。" },
  { category: "ネット通信とデジタル", question: "画像の画素の細かさを何というか。", options: ["解像度", "階調", "圧縮率", "フレームレート"], answer: 0, explanation: "解像度が高いほど繊細です。" },
  { category: "ネット通信とデジタル", question: "動画の1枚の静止画を何というか。", options: ["画素", "ピクセル", "フレーム", "トラック"], answer: 2, explanation: "フレームの連続が動画です。" },
  { category: "ネット通信とデジタル", question: "点の集まりで表現する画像形式は？", options: ["ベクター", "ラスター", "アナログ", "テキスト"], answer: 1, explanation: "ラスターデータ（ビットマップ）のことです。" },
  { category: "ネット通信とデジタル", question: "ネットを通じた資金提供の仕組みは？", options: ["電子マネー", "クラウドファンディング", "オンラインサロン", "シェアリングエコノミー"], answer: 1, explanation: "ファンディングは資金調達です。" },
  { category: "ネット通信とデジタル", question: "似た意見ばかりが集まる現象を何というか。", options: ["情報操作", "エコーチェンバー", "フィルタリング", "デジタルデトックス"], answer: 1, explanation: "反響室（エコーチェンバー）現象です。" },
  { category: "データのデジタル化", question: "段階的な値で表せるデータは？", options: ["アナログ", "デジタル", "連続", "波動"], answer: 1, explanation: "デジタルは離散的な値です。" },
  { category: "データのデジタル化", question: "デジタル化の正しい手順は？", options: ["量子化→標本化→符号化", "標本化→量子化→符号化", "符号化→標本化→量子化", "標本化→符号化→量子化"], answer: 1, explanation: "標本化→量子化→符号化の順です。" },
  { category: "データのデジタル化", question: "コンピュータの0と1は何の差？", options: ["電流", "電圧", "電線", "抵抗"], answer: 1, explanation: "電圧の高低（Low/High）です。" },
  { category: "データのデジタル化", question: "白黒画像（2値）の1画素のビット数は？", options: ["1ビット", "2ビット", "8ビット", "256ビット"], answer: 0, explanation: "2通り（0か1）なので1ビットです。" },
  { category: "データのデジタル化", question: "光の三原色は？", options: ["赤黄青", "CMY", "RGB", "白黒灰"], answer: 2, explanation: "RGB（赤緑青）が光の基本です。" },
  { category: "データのデジタル化", question: "フルカラー（8bit×3）は1画素何バイト？", options: ["1", "3", "8", "24"], answer: 1, explanation: "24ビット÷8＝3バイトです。" },
  { category: "データのデジタル化", question: "1KBは何B？", options: ["10", "100", "1000", "10000"], answer: 2, explanation: "問題文の計算式（今回は1000B）に従います。" },
  { category: "データのデジタル化", question: "圧縮後に戻せない圧縮方式は？", options: ["可逆", "非可逆", "展開", "暗号化"], answer: 1, explanation: "非可逆圧縮は効率的ですが劣化します。" },
  { category: "データのデジタル化", question: "600×400のフルカラー写真は何KB？", options: ["240", "720", "2400", "7200"], answer: 1, explanation: "600×400×3÷1000＝720KBです。" },
  { category: "情報デザイン", question: "不要な情報を捨てるデザインは？", options: ["可視化", "構造化", "抽象化", "標準化"], answer: 2, explanation: "抽象化で本質を抽出します。" },
  { category: "情報デザイン", question: "見えないものを見せるデザインは？", options: ["抽象化", "可視化", "構造化", "装飾化"], answer: 1, explanation: "可視化でグラフ化などを行います。" },
  { category: "情報デザイン", question: "情報同士を整理するのは？", options: ["抽象化", "可視化", "構造化", "符号化"], answer: 2, explanation: "構造化で関係性を示します。" },

    // 原データのうち、授業用としてより正確になるように一部を補正します。
    for (const q of allQuestions) {
      if (q.question.includes('許可が不要な範囲を何というか')) {
        q.answer = 3;
        q.explanation = '著作権には、教育・研究・引用など一定の条件で許可なく利用できる「著作権の制限」という考え方があります。私的利用はその一例ですが、この問題文ではより広い言い方が正解です。';
      }
      if (q.question.includes('自作の文章')) {
        q.explanation = '自分で書いた文章は、基本的に自分が著作者です。ただし、他人の文章や画像を入れている場合は、その部分の権利確認が必要です。';
      }
    }

    let activeQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let wrongAnswers = [];
    let isAnswered = false;
    let selectedOption = null;
    let lastCategory = 'all';

    const screens = {
      home: document.getElementById('home'),
      quiz: document.getElementById('quiz'),
      result: document.getElementById('result')
    };

    function showScreen(name) {
      Object.values(screens).forEach(el => el.classList.add('hidden'));
      screens[name].classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function shuffle(array) {
      const a = [...array];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getCategories() {
      return ['all', ...Array.from(new Set(allQuestions.map(q => q.category)))];
    }

    function buildCategoryButtons() {
      const grid = document.getElementById('categoryGrid');
      grid.innerHTML = '';
      getCategories().filter(c => c !== 'all').forEach(cat => {
        const count = allQuestions.filter(q => q.category === cat).length;
        const btn = document.createElement('button');
        btn.className = 'category-btn';
        btn.innerHTML = `<div>${escapeHtml(cat)}</div><div class="small">${count}問</div>`;
        btn.onclick = () => startQuiz(cat);
        grid.appendChild(btn);
      });
    }

    function startQuiz(category) {
      lastCategory = category;
      const filtered = category === 'all' ? allQuestions : allQuestions.filter(q => q.category === category);
      activeQuestions = shuffle(filtered);
      currentIndex = 0;
      score = 0;
      wrongAnswers = [];
      isAnswered = false;
      selectedOption = null;
      showScreen('quiz');
      renderQuestion();
    }

    function renderQuestion() {
      const q = activeQuestions[currentIndex];
      document.getElementById('categoryLabel').textContent = q.category;
      document.getElementById('questionText').textContent = q.question;
      document.getElementById('progressText').textContent = `${currentIndex + 1} / ${activeQuestions.length}`;
      document.getElementById('scoreText').textContent = `正解 ${score}`;
      document.getElementById('progressBar').style.width = `${(currentIndex / activeQuestions.length) * 100}%`;
      document.getElementById('explain').classList.add('hidden');
      document.getElementById('explain').innerHTML = '';

      const optionsEl = document.getElementById('options');
      optionsEl.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-mark">${String.fromCharCode(65 + i)}</span><span>${escapeHtml(opt)}</span>`;
        btn.onclick = () => handleAnswer(i);
        optionsEl.appendChild(btn);
      });
    }

    function handleAnswer(optionIndex) {
      if (isAnswered) return;
      isAnswered = true;
      selectedOption = optionIndex;
      const q = activeQuestions[currentIndex];
      const correct = optionIndex === q.answer;
      if (correct) score += 1;
      else wrongAnswers.push({ question: q.question, selected: q.options[optionIndex], correct: q.options[q.answer], explanation: q.explanation, point: makePoint(q) });

      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.answer) btn.classList.add('correct');
        else if (i === selectedOption) btn.classList.add('wrong');
        else btn.classList.add('dim');
      });
      renderExplanation(q, correct);
      document.getElementById('scoreText').textContent = `正解 ${score}`;
    }

    function renderExplanation(q, correct) {
      const explain = document.getElementById('explain');
      const answerText = q.options[q.answer];
      explain.classList.remove('hidden');
      explain.innerHTML = `
        <div class="judge ${correct ? 'ok' : 'ng'}">${correct ? '正解です' : '確認しましょう'}：正解は「${escapeHtml(answerText)}」</div>
        <div class="explain-body">
          <h3>なぜこの答え？</h3>
          <p>${escapeHtml(q.explanation)}</p>
          <div class="point-box">
            <strong>ここがポイント：</strong><br>${escapeHtml(makePoint(q))}
          </div>
          <div class="hint-box">
            <strong>迷ったときの考え方：</strong><br>${escapeHtml(makeHint(q))}
          </div>
          <button class="next-btn" onclick="nextQuestion()">${currentIndex + 1 < activeQuestions.length ? '次の問題へ' : '結果を見る'}</button>
        </div>
      `;
      document.getElementById('progressBar').style.width = `${((currentIndex + 1) / activeQuestions.length) * 100}%`;
    }

    function nextQuestion() {
      if (currentIndex + 1 < activeQuestions.length) {
        currentIndex += 1;
        isAnswered = false;
        selectedOption = null;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      showScreen('result');
      const total = activeQuestions.length;
      const percent = Math.round((score / total) * 100);
      document.getElementById('finalScore').textContent = `${score} / ${total}`;
      document.getElementById('totalCount').textContent = `${total}問`;
      document.getElementById('correctCount').textContent = `${score}問`;
      document.getElementById('rate').textContent = `${percent}%`;
      const reviewArea = document.getElementById('reviewArea');
      if (wrongAnswers.length === 0) {
        reviewArea.innerHTML = '<h2>すべて正解です</h2><p>用語を単独で覚えるだけでなく、「何のための考え方か」まで説明できるか確認してみましょう。</p>';
        return;
      }
      reviewArea.innerHTML = `<h2>間違えた問題の復習</h2><p class="small">間違えた問題は、正解の語だけでなく「なぜその語になるのか」を読み直すと定着しやすくなります。</p><div class="review-list">${wrongAnswers.map(w => `
        <div class="review-item">
          <div class="q">${escapeHtml(w.question)}</div>
          <div>あなたの答え：<strong style="color:#b91c1c">${escapeHtml(w.selected)}</strong></div>
          <div>正解：<strong style="color:#15803d">${escapeHtml(w.correct)}</strong></div>
          <div class="point-box"><strong>復習ポイント：</strong><br>${escapeHtml(w.explanation)}<br>${escapeHtml(w.point)}</div>
        </div>`).join('')}</div>`;
    }

    function restartSame() { startQuiz(lastCategory); }
    function goHome() { showScreen('home'); }

    function makePoint(q) {
      const text = q.question + ' ' + q.explanation + ' ' + q.options.join(' ');
      if (text.includes('標本化') || text.includes('サンプリング')) return '標本化は「時間を区切って取り出す」ことです。音なら、なめらかな波を一定間隔で測る作業だと考えると分かりやすくなります。';
      if (text.includes('量子化')) return '量子化は「値の細かさを決める」ことです。音なら強弱、画像なら色や明るさを何段階で表すかに関係します。';
      if (text.includes('符号化') || text.includes('文字コード')) return '符号化は、文字・音・画像などをコンピュータが扱える0と1の並びに対応させることです。';
      if (text.includes('2進') || text.includes('ビット')) return 'ビットは0か1の1けたです。nビットで表せる組み合わせは 2ⁿ 通りになります。';
      if (text.includes('著作権') || text.includes('引用') || text.includes('クリエイティブ')) return '著作権では「誰が作ったか」「どの範囲なら使えるか」「出典を示しているか」を分けて考えることが大切です。';
      if (text.includes('フィッシング') || text.includes('ランサム') || text.includes('パスワード') || text.includes('ゾンビ')) return '情報セキュリティの問題は、「人をだます攻撃」「機械に入り込む攻撃」「情報を盗む攻撃」に分けると整理しやすくなります。';
      if (text.includes('抽象化')) return '抽象化は、細かい情報を全部残すことではなく、目的に必要な特徴だけを取り出すことです。';
      if (text.includes('可視化') || text.includes('グラフ') || text.includes('インフォグラフィック')) return '可視化は、数字や関係のようにそのままでは見えにくい情報を、図・表・グラフで見える形にすることです。';
      if (text.includes('構造化') || text.includes('サイトマップ') || text.includes('パンくず')) return '構造化は、情報同士の関係や順序を整理することです。Webページでは階層や現在地を示す工夫につながります。';
      if (text.includes('メディア')) return 'メディアは「情報を表すもの・伝えるもの・記録するもの」に分けて考えると、選択肢を見分けやすくなります。';
      if (text.includes('問題解決') || text.includes('ブレーン') || text.includes('KJ') || text.includes('マインド')) return '問題解決では、いきなり解決策に飛びつかず、現状と理想の差を見つけ、原因や関係を整理することが重要です。';
      if (text.includes('SNS') || text.includes('炎上') || text.includes('デジタルタトゥー') || text.includes('エコーチェンバー')) return 'ネット上の発信は、複製・拡散・保存されやすいので、相手・範囲・残り方を想像してから投稿することが大切です。';
      if (text.includes('ユーザビリティ') || text.includes('アクセシビリティ') || text.includes('ユニバーサル')) return '使いやすさを考えるときは、自分だけでなく、初めて使う人、年齢や身体条件が違う人にも伝わるかを考えます。';
      return '用語を暗記するだけでなく、「何を対象にした言葉か」「何のために使う考え方か」をセットで押さえると、似た選択肢に迷いにくくなります。';
    }

    function makeHint(q) {
      const qtext = q.question;
      if (qtext.includes('誤っている') || qtext.includes('適切でない') || qtext.includes('含まれない')) return 'この問題は「正しいもの」ではなく、違うものを選ぶ問題です。選択肢を1つずつ○×で確認してから答えるとミスを防げます。';
      if (q.options.some(o => /権$/.test(o))) return '権利の問題では、作品の表現なら著作権、ブランド名やロゴなら商標権、発明なら特許権、形やデザインなら意匠権と整理します。';
      if (q.category.includes('デジタル')) return 'デジタル化の問題では、「何を区切っているのか」「何を0と1で表しているのか」を考えると答えに近づきます。';
      if (q.category.includes('情報デザイン')) return '情報デザインの問題では、見た目の美しさだけでなく、相手が迷わず理解・行動できるかを基準に考えます。';
      return '選択肢の言葉が似ているときは、問題文のキーワードと用語の意味を対応させて考えましょう。';
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[ch]));
    }

    buildCategoryButtons();
  </script>
