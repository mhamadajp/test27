<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>共役複素数ビジュアライザー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* アニメーション用のクラス */
    .fade {
      transition: opacity 0.5s ease-in-out;
    }
    .hidden-state {
      opacity: 0;
      pointer-events: none;
    }
    .visible-state {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center p-4 md:p-8 font-sans">
  
  <div class="max-w-5xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
    
    <!-- 左パネル: 説明エリア -->
    <div class="w-full md:w-5/12 bg-white p-6 md:p-8 flex flex-col border-r border-gray-100">
      <a href="../index.html" class="inline-flex self-start mb-4 text-sm font-bold text-blue-700 bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-full transition-colors">
        ← トップへ戻る
      </a>
      <div class="flex-grow">
        <h2 id="step-counter" class="text-sm font-bold text-blue-500 uppercase tracking-wider mb-2"></h2>
        <h1 id="step-title" class="text-2xl font-extrabold text-gray-900 mb-2"></h1>
        <p id="step-desc" class="text-gray-500 mb-6 pb-4 border-b border-gray-100"></p>
        
        <div id="step-content" class="fade">
          <!-- JSでコンテンツが差し込まれます -->
        </div>
      </div>

      <!-- ナビゲーションボタン -->
      <div class="mt-8 flex justify-between items-center pt-4 border-t border-gray-100">
        <button id="btn-prev" onclick="prevStep()" class="flex items-center px-4 py-2 rounded-lg font-medium transition-colors text-gray-300 cursor-not-allowed" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          戻る
        </button>
        <button id="btn-next" onclick="nextStep()" class="flex items-center px-6 py-2 rounded-lg font-bold transition-colors bg-blue-600 text-white hover:bg-blue-700 shadow-md">
          次へ
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ml-1"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </div>
    </div>

    <!-- 右パネル: SVGビジュアライザー -->
    <div class="w-full md:w-7/12 bg-slate-900 p-4 flex flex-col items-center justify-center relative min-h-[400px]">
      
      <!-- 凡例 -->
      <div class="absolute top-4 left-4 text-xs text-slate-300 space-y-1 bg-slate-800/80 p-3 rounded-lg backdrop-blur-sm border border-slate-700">
        <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-blue-500 mr-2"></span> 実軸 (Real)</div>
        <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-gray-500 mr-2"></span> 虚軸 (Imaginary)</div>
        <div id="legend-sq" class="fade hidden-state flex items-center mt-1"><span class="w-3 h-3 rounded-full bg-red-500 mr-2"></span> 2乗した結果</div>
        <div id="legend-sol" class="fade hidden-state flex items-center mt-1"><span class="w-3 h-3 rounded-full bg-yellow-400 mr-2"></span> 方程式の解</div>
      </div>

      <svg width="100%" height="400" viewBox="0 0 500 400" class="overflow-visible">
        <!-- 矢印マーカーとグラデーションの定義 -->
        <defs>
          <linearGradient id="mirrorGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#38bdf8" stop-opacity="0" />
            <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
          </linearGradient>
          <marker id="arrowGreen" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e" />
          </marker>
          <marker id="arrowPurple" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7" />
          </marker>
          <marker id="arrowRed" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
          </marker>
        </defs>

        <!-- 背景グリッド (JSで生成) -->
        <g id="grid-group"></g>

        <!-- 軸 -->
        <line x1="250" y1="0" x2="250" y2="400" stroke="#64748b" stroke-width="2" />
        <text x="430" y="185" fill="#3b82f6" font-size="14" font-weight="bold">Re</text>
        <text x="260" y="20" fill="#64748b" font-size="14" font-weight="bold">Im</text>
        <text x="235" y="185" fill="#94a3b8" font-size="12">0</text>

        <!-- Step 4: 鏡エフェクト -->
        <g id="mirror-effect" class="fade hidden-state">
          <rect x="50" y="195" width="400" height="10" fill="url(#mirrorGrad)"></rect>
          <text x="70" y="190" fill="#38bdf8" font-size="16" font-weight="bold">🪞 実軸 ＝ 鏡</text>
        </g>

        <!-- 実軸線 -->
        <line id="real-axis" x1="50" y1="200" x2="450" y2="200" stroke="#3b82f6" stroke-width="2" class="fade" />

        <!-- ★ Step 2用: 「2乗の不思議」の図 -->
        <g id="step2-group" class="fade hidden-state">
          <!-- 原点からの2iと-2i -->
          <line x1="250" y1="200" x2="250" y2="120" stroke="#22c55e" stroke-width="3" marker-end="url(#arrowGreen)"></line>
          <circle cx="250" cy="120" r="5" fill="#22c55e"></circle>
          <text x="260" y="115" fill="#22c55e" font-size="16" font-weight="bold">2i</text>
          
          <line x1="250" y1="200" x2="250" y2="280" stroke="#a855f7" stroke-width="3" marker-end="url(#arrowPurple)"></line>
          <circle cx="250" cy="280" r="5" fill="#a855f7"></circle>
          <text x="260" y="295" fill="#a855f7" font-size="16" font-weight="bold">-2i</text>

          <!-- 2乗の軌跡 -->
          <path d="M 250 120 Q 150 120 90 200" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowRed)"></path>
          <path d="M 250 280 Q 150 280 90 200" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowRed)"></path>
          
          <!-- -4の点 -->
          <circle cx="90" cy="200" r="6" fill="#ef4444"></circle>
          <text x="65" y="195" fill="#ef4444" font-size="16" font-weight="bold">-4</text>
          <text x="130" y="150" fill="#ef4444" font-size="12">2乗する</text>
          <text x="130" y="260" fill="#ef4444" font-size="12">2乗する</text>
        </g>

        <!-- ★ Step 3, 4用: 「解の配置とズレ」の図 -->
        <g id="step3-group" class="fade hidden-state">
          <!-- 基準となる1の点 -->
          <circle cx="290" cy="200" r="5" fill="#cbd5e1"></circle>
          <text x="295" y="185" fill="#cbd5e1" font-size="14" font-weight="bold">基準 1</text>

          <!-- 1からのズレを示す点線矢印 -->
          <line x1="290" y1="200" x2="290" y2="120" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowGreen)"></line>
          <line x1="290" y1="200" x2="290" y2="280" stroke="#a855f7" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowPurple)"></line>
          
          <text x="300" y="160" fill="#22c55e" font-size="12">上に 2i のズレ</text>
          <text x="300" y="250" fill="#a855f7" font-size="12">下に -2i のズレ</text>

          <!-- 解の点 -->
          <circle cx="290" cy="120" r="7" fill="#facc15"></circle>
          <text x="305" y="125" fill="#facc15" font-size="18" font-weight="bold">1 + 2i</text>
          
          <circle cx="290" cy="280" r="7" fill="#facc15"></circle>
          <text x="305" y="285" fill="#facc15" font-size="18" font-weight="bold">1 - 2i</text>
        </g>

      </svg>
    </div>
  </div>

  <script>
    // --- データの定義 ---
    const stepsData = [
      {
        title: "1. 方程式の変形",
        description: "まずは方程式の形を変えて、意味を考えてみましょう。",
        contentHtml: `
          <div class="space-y-4 text-gray-700">
            <p>2次方程式 <code class="bg-gray-100 px-1 rounded font-mono">x² - 2x + 5 = 0</code> を変形します。</p>
            <div class="bg-blue-50 p-4 rounded-lg font-mono text-center text-lg shadow-inner border border-blue-100">
              (x - 1)² + 4 = 0<br />
              <span class="font-bold text-blue-700">(x - 1)² = -4</span>
            </div>
            <div class="border-l-4 border-blue-500 pl-4 py-2 bg-gray-50">
              <p class="font-bold text-lg text-blue-600">「何を2乗したら -4 になる？」</p>
              <p class="text-sm mt-1">実数の世界では無理ですが、複素数の世界ならどうでしょうか？</p>
            </div>
          </div>
        `
      },
      {
        title: "2. 「2乗」の不思議",
        description: "2乗すると -4 になる数を、複素平面（右図）で探します。",
        contentHtml: `
          <div class="space-y-4 text-gray-700">
            <p>複素数 <code class="bg-gray-100 px-1 rounded font-bold text-green-600">2i</code> を2乗してみましょう。</p>
            <div class="bg-gray-100 p-2 rounded text-center font-mono">(2i)² = 4i² = <span class="font-bold text-red-500">-4</span></div>
            <p>では、下向きの <code class="bg-gray-100 px-1 rounded font-bold text-purple-600">-2i</code> はどうでしょうか？</p>
            <div class="bg-gray-100 p-2 rounded text-center font-mono">(-2i)² = 4i² = <span class="font-bold text-red-500">-4</span></div>
            <p class="font-bold text-red-600 bg-red-50 p-3 rounded text-sm shadow-sm">
              👉 上向き(2i)も下向き(-2i)も、2乗すると上下の違いが消えて、まったく同じ「-4」に着地します！
            </p>
          </div>
        `
      },
      {
        title: "3. 解の配置とズレ",
        description: "(x-1)² = -4 の解を図示します。",
        contentHtml: `
          <div class="space-y-4 text-gray-700">
            <p>先ほどの式 <code class="bg-gray-100 px-1 rounded font-mono">(x - 1)² = -4</code> に戻ります。</p>
            <p>これは<strong>「x は 1 からどれだけずれているか」</strong>を表しています。<br>そのズレの2乗が -4 になるということです。</p>
            <div class="bg-blue-50 p-3 rounded-lg font-mono text-center shadow-inner border border-blue-100">
              x - 1 = <span class="text-green-600">2i</span><br />
              x - 1 = <span class="text-purple-600">-2i</span>
            </div>
            <p>つまり解は、<span class="font-bold border-b-2 border-blue-300">基準となる「1」から</span>、上に 2i、下に -2i ずれた場所になります。</p>
            <div class="bg-gray-100 p-2 rounded text-center font-mono font-bold text-lg">
              x = 1 + 2i ,  x = 1 - 2i
            </div>
          </div>
        `
      },
      {
        title: "4. 核心：実軸は「鏡」",
        description: "なぜ虚数解はペアになるのか？",
        contentHtml: `
          <div class="space-y-4 text-gray-700">
            <p>実数だけでできた方程式は、複素平面で<span class="font-bold text-blue-600">「上と下を区別する情報」を持っていません。</span></p>
            <div class="border-2 border-yellow-400 bg-yellow-50 p-4 rounded-lg shadow-sm">
              <h4 class="font-bold text-yellow-800 mb-2">🪞 鏡の比喩</h4>
              <p class="text-sm leading-relaxed">式の世界は「実軸を基準にした世界」です。実軸を鏡として見たとき、上と下を区別できないのです。</p>
              <p class="mt-2 font-bold text-sm text-yellow-900 bg-yellow-200/50 p-2 rounded">
                だから、上側（+qi）に解があるなら、鏡に映った下側（-qi）にも必ず解が現れます。
              </p>
            </div>
            <p class="font-bold bg-slate-800 text-white p-3 rounded text-center shadow-md">
              結論：虚数解は必ず「共役なペア」になる
            </p>
          </div>
        `
      }
    ];

    let currentStep = 0;

    // --- 初期化 ---
    document.addEventListener("DOMContentLoaded", () => {
      // 背景グリッドの描画 (40px間隔)
      const gridGroup = document.getElementById('grid-group');
      let gridHTML = '';
      for(let i = -5; i <= 5; i++) {
        const pos = 200 + i * 40;
        gridHTML += `<line x1="50" y1="${pos}" x2="450" y2="${pos}" stroke="#334155" stroke-width="1"></line>`;
        const xPos = 250 + i * 40;
        gridHTML += `<line x1="${xPos}" y1="0" x2="${xPos}" y2="400" stroke="#334155" stroke-width="1"></line>`;
      }
      gridGroup.innerHTML = gridHTML;
      updateUI();
    });

    // --- ステップ制御 ---
    function nextStep() {
      if (currentStep < stepsData.length - 1) { currentStep++; updateUI(); }
    }
    function prevStep() {
      if (currentStep > 0) { currentStep--; updateUI(); }
    }

    // --- UI更新 ---
    function updateUI() {
      document.getElementById('step-title').innerHTML = stepsData[currentStep].title;
      document.getElementById('step-desc').innerHTML = stepsData[currentStep].description;
      document.getElementById('step-counter').innerText = `Step ${currentStep + 1} of ${stepsData.length}`;
      
      const contentEl = document.getElementById('step-content');
      contentEl.style.opacity = 0;
      setTimeout(() => {
        contentEl.innerHTML = stepsData[currentStep].contentHtml;
        contentEl.style.opacity = 1;
      }, 150);

      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');
      
      btnPrev.disabled = currentStep === 0;
      btnNext.disabled = currentStep === stepsData.length - 1;

      btnPrev.className = currentStep === 0 
        ? "flex items-center px-4 py-2 rounded-lg font-medium transition-colors text-gray-300 cursor-not-allowed"
        : "flex items-center px-4 py-2 rounded-lg font-medium transition-colors text-gray-600 hover:bg-gray-200 active:bg-gray-300";
        
      btnNext.className = currentStep === stepsData.length - 1
        ? "flex items-center px-6 py-2 rounded-lg font-bold transition-colors bg-gray-200 text-gray-400 cursor-not-allowed"
        : "flex items-center px-6 py-2 rounded-lg font-bold transition-colors bg-blue-600 text-white hover:bg-blue-700 shadow-md active:bg-blue-800 transform active:scale-95";

      updateSVG();
    }

    // --- SVG図の表示切り替え ---
    function updateSVG() {
      const step2Group = document.getElementById('step2-group');
      const step3Group = document.getElementById('step3-group');
      const mirrorEffect = document.getElementById('mirror-effect');
      const realAxis = document.getElementById('real-axis');

      // 凡例の制御
      document.getElementById('legend-sq').className = currentStep >= 1 ? "fade visible-state flex items-center mt-1" : "fade hidden-state flex items-center mt-1";
      document.getElementById('legend-sol').className = currentStep >= 2 ? "fade visible-state flex items-center mt-1" : "fade hidden-state flex items-center mt-1";

      if (currentStep === 0) {
        step2Group.classList.replace('visible-state', 'hidden-state');
        step3Group.classList.replace('visible-state', 'hidden-state');
        mirrorEffect.classList.replace('visible-state', 'hidden-state');
        realAxis.setAttribute('stroke', '#3b82f6');
        realAxis.setAttribute('stroke-width', '2');
      } 
      else if (currentStep === 1) {
        step2Group.classList.replace('hidden-state', 'visible-state'); // 2乗の図を表示
        step3Group.classList.replace('visible-state', 'hidden-state'); // ズレの図は隠す
        mirrorEffect.classList.replace('visible-state', 'hidden-state');
        realAxis.setAttribute('stroke', '#3b82f6');
        realAxis.setAttribute('stroke-width', '2');
      }
      else if (currentStep === 2) {
        step2Group.classList.replace('visible-state', 'hidden-state'); // 2乗の図は隠す
        step3Group.classList.replace('hidden-state', 'visible-state'); // ズレの図を表示
        mirrorEffect.classList.replace('visible-state', 'hidden-state');
        realAxis.setAttribute('stroke', '#3b82f6');
        realAxis.setAttribute('stroke-width', '2');
      }
      else if (currentStep === 3) {
        step2Group.classList.replace('visible-state', 'hidden-state');
        step3Group.classList.replace('hidden-state', 'visible-state');
        mirrorEffect.classList.replace('hidden-state', 'visible-state'); // 鏡エフェクト追加
        realAxis.setAttribute('stroke', '#38bdf8');
        realAxis.setAttribute('stroke-width', '4');
      }
    }
  </script>
</body>
</html>
