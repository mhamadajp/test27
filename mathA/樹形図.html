<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樹形図シミュレーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f8fafc;
        }
        /* SVGの描画領域 */
        #treeSvg {
            width: 100%;
            height: 100%;
            min-height: 400px;
        }
        .node-circle {
            fill: #ffffff;
            stroke: #3b82f6;
            stroke-width: 2;
            cursor: pointer;
            transition: all 0.2s;
        }
        .node-circle:hover {
            fill: #eff6ff;
            stroke: #2563eb;
            stroke-width: 3;
        }
        .node-text {
            font-size: 14px;
            font-weight: bold;
            fill: #1e293b;
            pointer-events: none;
        }
        .link-line {
            stroke: #cbd5e1;
            stroke-width: 2;
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col">

    <div class="max-w-6xl mx-auto w-full flex-1 flex flex-col bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        
        <!-- ヘッダー -->
        <div class="bg-blue-600 text-white p-4 md:p-6 flex justify-between items-center">
            <div>
                <h1 class="text-xl md:text-2xl font-bold">インタラクティブ樹形図メーカー</h1>
                <p class="text-blue-100 text-sm mt-1">「場合の数」や「確率」の学習に。ノードをクリックして枝を増やそう！</p>
            </div>
            <div class="flex gap-2">
                <a href="../index.html" class="bg-white text-blue-700 hover:bg-blue-50 px-4 py-2 rounded transition-colors text-sm font-bold shadow-sm">
                    トップへ戻る
                </a>
                <button id="resetBtn" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded transition-colors text-sm font-bold">
                    初期化
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col md:flex-row">
            
            <!-- 左側：コントロールパネル -->
            <div class="w-full md:w-72 bg-gray-50 border-r border-gray-200 p-4 flex flex-col gap-4 overflow-y-auto">
                <div class="bg-white p-3 rounded shadow-sm border border-gray-200">
                    <h3 class="font-bold text-gray-700 text-sm mb-2 flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                        使い方
                    </h3>
                    <ul class="text-xs text-gray-600 space-y-2 list-disc pl-4">
                        <li>図の<b class="text-blue-600">青い丸（ノード）</b>をクリックすると枝が追加されます。</li>
                        <li>画面の白い部分を<b class="text-blue-600">ドラッグして移動</b>（スクロール）できます。</li>
                        <li>マウスホイールで<b class="text-blue-600">拡大・縮小</b>ができます。</li>
                    </ul>
                </div>

                <div class="bg-white p-3 rounded shadow-sm border border-gray-200 mt-2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">追加する枝の数（最大10）</label>
                    <div class="flex items-center gap-2">
                        <!-- maxを10に変更 -->
                        <input type="range" id="branchCountSlider" min="2" max="10" value="2" class="flex-1 accent-blue-600">
                        <span id="branchCountDisplay" class="font-bold text-blue-600 w-6 text-center">2</span>
                    </div>
                </div>

                <div class="bg-white p-3 rounded shadow-sm border border-gray-200 mt-2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">新しい枝のラベル</label>
                    <select id="labelFormat" class="w-full border border-gray-300 rounded p-1 text-sm text-gray-700 outline-none focus:border-blue-500">
                        <option value="number">数字 (1, 2, 3...)</option>
                        <option value="alphabet">アルファベット (A, B, C...)</option>
                        <option value="coin">表 / 裏</option>
                        <option value="blank">空白 (あとで入力)</option>
                    </select>
                </div>

                <!-- 追加：重複を許すかどうかの設定 -->
                <div class="bg-white p-3 rounded shadow-sm border border-blue-200 mt-2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">同じラベルの重複</label>
                    <select id="allowDuplicate" class="w-full border border-gray-300 rounded p-1 text-sm text-gray-700 outline-none focus:border-blue-500 bg-blue-50">
                        <option value="yes">許可する（サイコロなど）</option>
                        <option value="no">許可しない（くじ引きなど）</option>
                    </select>
                    <p class="text-xs text-gray-500 mt-1">※「許可しない」を選ぶと、経路で一度出たラベルは除外されます。</p>
                </div>
                
                <div class="bg-white p-3 rounded shadow-sm border border-gray-200 mt-auto">
                    <div class="text-sm text-gray-600 mb-1">現在の末端（ルート）の総数</div>
                    <div class="text-3xl font-extrabold text-blue-600 flex items-baseline gap-1">
                        <span id="leafCount">1</span>
                        <span class="text-base font-normal text-gray-500">通り</span>
                    </div>
                </div>
            </div>

            <!-- 右側：SVG描画エリア -->
            <div class="flex-1 relative overflow-hidden bg-white cursor-grab active:cursor-grabbing" id="svgContainer">
                <svg id="treeSvg" class="w-full h-full">
                    <g id="zoomGroup"></g>
                </svg>

                <div class="absolute bottom-4 right-4 flex flex-col gap-2 bg-white/90 p-2 rounded shadow-lg border border-gray-200">
                    <button id="zoomInBtn" class="w-8 h-8 flex items-center justify-center bg-gray-50 hover:bg-blue-50 text-gray-700 hover:text-blue-600 rounded font-bold text-xl transition-colors">+</button>
                    <button id="zoomOutBtn" class="w-8 h-8 flex items-center justify-center bg-gray-50 hover:bg-blue-50 text-gray-700 hover:text-blue-600 rounded font-bold text-xl transition-colors">-</button>
                    <button id="fitBtn" class="w-8 h-8 flex items-center justify-center bg-gray-50 hover:bg-blue-50 text-gray-700 hover:text-blue-600 rounded text-xs font-bold transition-colors">FIT</button>
                </div>
            </div>
            
        </div>
    </div>

    <!-- モーダル（ノードのラベル変更用） -->
    <div id="labelModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg shadow-xl w-80">
            <h3 class="font-bold text-lg mb-4">ラベルの変更</h3>
            <input type="text" id="labelText" class="w-full border border-gray-300 rounded p-2 mb-4 focus:outline-none focus:border-blue-500" placeholder="例: 表, 裏, A, B">
            <div class="flex justify-end gap-2">
                <button id="modalDeleteBtn" class="px-4 py-2 bg-red-100 text-red-600 rounded hover:bg-red-200 font-bold mr-auto">子を削除</button>
                <button id="modalCancelBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 font-bold">キャンセル</button>
                <button id="modalSaveBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-bold">保存</button>
            </div>
        </div>
    </div>

    <script>
        // --- 状態管理 ---
        let treeData = {
            id: 'root',
            label: '開始',
            children: []
        };
        let nextId = 1;

        let branchCount = 2;
        const NODE_RADIUS = 20;
        const LEVEL_WIDTH = 150;
        const NODE_HEIGHT_SPACING = 50;

        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startDragX = 0;
        let startDragY = 0;

        // DOM要素
        const svg = document.getElementById('treeSvg');
        const zoomGroup = document.getElementById('zoomGroup');
        const container = document.getElementById('svgContainer');
        const branchCountSlider = document.getElementById('branchCountSlider');
        const branchCountDisplay = document.getElementById('branchCountDisplay');
        const leafCountDisplay = document.getElementById('leafCount');
        const labelFormatSelect = document.getElementById('labelFormat');
        const allowDuplicateSelect = document.getElementById('allowDuplicate'); // 追加
        
        const modal = document.getElementById('labelModal');
        const labelInput = document.getElementById('labelText');
        let editingNodeId = null;

        // --- パン＆ズームのイベントリスナー ---
        function updateTransform() {
            zoomGroup.setAttribute('transform', `translate(${translateX}, ${translateY}) scale(${scale})`);
        }

        container.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'circle' || e.target.tagName === 'text') return;
            isDragging = true;
            startDragX = e.clientX - translateX;
            startDragY = e.clientY - translateY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startDragX;
            translateY = e.clientY - startDragY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = container.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const xs = (mouseX - translateX) / scale;
            const ys = (mouseY - translateY) / scale;

            const zoomFactor = e.deltaY > 0 ? -0.1 : 0.1;
            let newScale = scale + zoomFactor;
            newScale = Math.max(0.2, Math.min(newScale, 5));

            translateX += xs * (scale - newScale);
            translateY += ys * (scale - newScale);
            scale = newScale;

            updateTransform();
        }, { passive: false });

        document.getElementById('zoomInBtn').addEventListener('click', () => {
            const rect = container.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const xs = (centerX - translateX) / scale;
            const ys = (centerY - translateY) / scale;
            
            let newScale = Math.min(scale + 0.2, 5);
            translateX += xs * (scale - newScale);
            translateY += ys * (scale - newScale);
            scale = newScale;
            updateTransform();
        });

        document.getElementById('zoomOutBtn').addEventListener('click', () => {
            const rect = container.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const xs = (centerX - translateX) / scale;
            const ys = (centerY - translateY) / scale;
            
            let newScale = Math.max(scale - 0.2, 0.2);
            translateX += xs * (scale - newScale);
            translateY += ys * (scale - newScale);
            scale = newScale;
            updateTransform();
        });

        document.getElementById('fitBtn').addEventListener('click', () => {
            scale = 1;
            translateX = 0;
            const totalHeight = calculateHeight(treeData);
            translateY = Math.max(container.clientHeight / 2 - (totalHeight * NODE_HEIGHT_SPACING) / 2, 50) - 50;
            updateTransform();
        });

        // --- イベントリスナー設定 ---
        branchCountSlider.addEventListener('input', (e) => {
            branchCount = parseInt(e.target.value);
            branchCountDisplay.textContent = branchCount;
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            treeData = { id: 'root', label: '開始', children: [] };
            nextId = 1;
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
            renderTree();
        });

        document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
        
        document.getElementById('modalSaveBtn').addEventListener('click', () => {
            if (editingNodeId) {
                const node = findNode(treeData, editingNodeId);
                if (node) {
                    node.label = labelInput.value;
                    renderTree();
                }
            }
            closeModal();
        });

        document.getElementById('modalDeleteBtn').addEventListener('click', () => {
            if (editingNodeId && editingNodeId !== 'root') {
                const node = findNode(treeData, editingNodeId);
                if (node) {
                    node.children = [];
                    renderTree();
                }
            }
            closeModal();
        });

        function closeModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            editingNodeId = null;
        }

        // --- ツリー操作関数 ---

        function findNode(node, id) {
            if (node.id === id) return node;
            if (node.children) {
                for (let child of node.children) {
                    const found = findNode(child, id);
                    if (found) return found;
                }
            }
            return null;
        }

        // 追加：ルートから指定ノードまでの経路（配列）を取得する関数
        function getPathToNode(node, targetId, path = []) {
            const currentPath = [...path, node];
            if (node.id === targetId) return currentPath;
            
            if (node.children) {
                for (let child of node.children) {
                    const result = getPathToNode(child, targetId, currentPath);
                    if (result) return result;
                }
            }
            return null;
        }

        function handleNodeClick(e, id) {
            e.stopPropagation();
            
            const node = findNode(treeData, id);
            if (!node) return;

            if (node.children && node.children.length > 0) {
                editingNodeId = id;
                labelInput.value = node.label;
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                labelInput.focus();
                
                const delBtn = document.getElementById('modalDeleteBtn');
                if(id === 'root') delBtn.style.display = 'none';
                else delBtn.style.display = 'block';
                
            } else {
                node.children = [];
                const format = labelFormatSelect.value;
                const allowDup = allowDuplicateSelect.value; // 重複許可設定の取得
                
                // 1. まず「追加する枝の数」の分だけ、全ての候補を作る
                let allCandidates = [];
                for (let i = 0; i < branchCount; i++) {
                    if (format === 'alphabet') {
                        allCandidates.push(String.fromCharCode(65 + i)); 
                    } else if (format === 'coin') {
                        allCandidates.push((i % 2 === 0) ? "表" : "裏");
                    } else if (format === 'number') {
                        allCandidates.push(`${i + 1}`);
                    } else if (format === 'blank') {
                        allCandidates.push("");
                    }
                }

                // 2. 「許可しない」設定なら、経路にあるラベルを除外する
                let availableCandidates = allCandidates;
                if (allowDup === 'no' && format !== 'blank') {
                    const path = getPathToNode(treeData, id);
                    // 経路上のラベルの集合（開始ノードなどは除外しても良いが、ここでは単純にラベル文字列のSetを作る）
                    const usedLabels = new Set(path.map(n => n.label));
                    // まだ使われていない候補だけを残す
                    availableCandidates = allCandidates.filter(label => !usedLabels.has(label));
                }
                
                // 3. 残った候補の数だけ子ノードを追加する
                for (let label of availableCandidates) {
                    node.children.push({
                        id: `node_${nextId++}`,
                        label: label,
                        children: []
                    });
                }
                renderTree();
            }
        }

        function countLeaves(node) {
            if (!node.children || node.children.length === 0) {
                return 1;
            }
            let count = 0;
            for (let child of node.children) {
                count += countLeaves(child);
            }
            return count;
        }

        function calculateHeight(node) {
            if (!node.children || node.children.length === 0) {
                node._height = 1;
            } else {
                node._height = 0;
                for (let child of node.children) {
                    node._height += calculateHeight(child);
                }
            }
            return node._height;
        }

        // --- レイアウト計算と描画 ---

        function renderTree() {
            zoomGroup.innerHTML = '';
            leafCountDisplay.textContent = countLeaves(treeData);

            const totalHeight = calculateHeight(treeData);
            // 初期表示でY軸の中央に配置するためのオフセット
            const startY = Math.max(container.clientHeight / 2 - (totalHeight * NODE_HEIGHT_SPACING) / 2, 50);

            const nodes = [];
            const links = [];

            function assignCoordinates(node, depth, currentY) {
                node.x = 50 + depth * LEVEL_WIDTH;
                node.y = currentY + (node._height * NODE_HEIGHT_SPACING) / 2;
                
                nodes.push(node);

                if (node.children && node.children.length > 0) {
                    let childY = currentY;
                    for (let child of node.children) {
                        assignCoordinates(child, depth + 1, childY);
                        links.push({
                            source: node,
                            target: child
                        });
                        childY += child._height * NODE_HEIGHT_SPACING;
                    }
                }
            }
            assignCoordinates(treeData, 0, startY);

            for (let link of links) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", link.source.x);
                line.setAttribute("y1", link.source.y);
                line.setAttribute("x2", link.target.x);
                line.setAttribute("y2", link.target.y);
                line.setAttribute("class", "link-line");
                zoomGroup.appendChild(line);
            }

            for (let node of nodes) {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", node.x);
                circle.setAttribute("cy", node.y);
                circle.setAttribute("r", NODE_RADIUS);
                circle.setAttribute("class", "node-circle");
                circle.onclick = (e) => handleNodeClick(e, node.id);
                
                if(node.children && node.children.length > 0) {
                    circle.style.fill = "#f8fafc";
                    circle.style.stroke = "#94a3b8";
                }

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", node.x);
                text.setAttribute("y", node.y);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("dominant-baseline", "central");
                text.setAttribute("class", "node-text");
                
                let displayText = node.label;
                if (displayText.length > 3) displayText = displayText.substring(0, 2) + '..';
                text.textContent = displayText;

                g.appendChild(circle);
                g.appendChild(text);
                zoomGroup.appendChild(g);
            }
        }

        window.addEventListener('resize', renderTree);
        
        // 初回ロード時に初期化のためにFITを実行する
        const initialTotalHeight = calculateHeight(treeData);
        translateY = Math.max(container.clientHeight / 2 - (initialTotalHeight * NODE_HEIGHT_SPACING) / 2, 50) - 50;
        updateTransform();
        renderTree();

    </script>
</body>
</html>
